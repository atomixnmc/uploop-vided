<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Simulation — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      gap: 14px;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      z-index: 100;
    }
    .back:hover { color: #fff; }
    .title-bar {
      width: min(900px, 90vw);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title-bar h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #4f8;
    }
    .title-bar span {
      font-size: 12px;
      color: #666;
    }
    .stage {
      width: min(900px, 90vw);
      height: min(500px, 60vh);
      background: #151520;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .stage canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    .controls-panel {
      width: min(900px, 90vw);
      background: #151520;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 100px;
    }
    .control-group label {
      font-size: 11px;
      color: #888;
    }
    .control-group .value-display {
      font-size: 11px;
      color: #4f8;
      font-family: 'Courier New', monospace;
    }
    .control-group input[type="range"] {
      width: 100%;
      accent-color: #4f8;
    }
    .controls-panel button {
      background: #1e1e30;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .controls-panel button:hover { background: #2a2a40; }
    .controls-panel button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .info-panel {
      width: min(900px, 90vw);
      background: #151520;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .info-panel .stat {
      display: flex;
      gap: 6px;
    }
    .info-panel .stat-label { color: #888; }
    .info-panel .stat-value { color: #f8c040; font-family: 'Courier New', monospace; }
    .legend {
      display: flex;
      gap: 14px;
      width: min(900px, 90vw);
      flex-wrap: wrap;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #888;
    }
    .legend .swatch {
      width: 14px; height: 4px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>

  <div class="title-bar">
    <h1>⚛️ Particle Simulation</h1>
    <span>Gravity · Collisions · Trails</span>
  </div>

  <div class="stage">
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls-panel" id="controlsPanel">
    <div class="control-group">
      <label>Gravity <span id="gravVal" class="value-display">0.5</span></label>
      <input type="range" id="gravity" min="0" max="2" step="0.05" value="0.5">
    </div>
    <div class="control-group">
      <label>Bounce <span id="bounceVal" class="value-display">0.75</span></label>
      <input type="range" id="bounce" min="0.1" max="1" step="0.05" value="0.75">
    </div>
    <div class="control-group">
      <label>Friction <span id="fricVal" class="value-display">0.01</span></label>
      <input type="range" id="friction" min="0" max="0.05" step="0.002" value="0.01">
    </div>
    <div class="control-group">
      <label>Count <span id="countVal" class="value-display">80</span></label>
      <input type="range" id="particleCount" min="10" max="100" step="5" value="80">
    </div>
    <button id="playBtn">⏸ Pause</button>
    <button id="resetBtn">↺ Reset</button>
    <button id="burstBtn">💥 Burst</button>
  </div>

  <div class="info-panel" id="info"></div>
  <div class="legend" id="legend">
    <span><span class="swatch" style="background:#4f8"></span> Low speed</span>
    <span><span class="swatch" style="background:#f8c040"></span> Medium speed</span>
    <span><span class="swatch" style="background:#ff4060"></span> High speed</span>
  </div>

  <script type="module">
    import { easing } from '@uploop/timeline'
    import { blendModes } from '@uploop/compositor'

    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')

    let W, H
    let particles = []
    let trails = [] // trail history: array of {x, y, alpha} arrays
    let playing = true
    let gravity = 0.5
    let bounce = 0.75
    let friction = 0.01
    let targetCount = 80

    const TRAIL_LENGTH = 30
    const PARTICLE_RADIUS = 3

    // ── Particle class ────────────────────────────────────────────────
    class Particle {
      constructor(x, y, vx, vy) {
        this.x = x
        this.y = y
        this.vx = vx || (Math.random() - 0.5) * 4
        this.vy = vy || -Math.random() * 6 - 2
        this.radius = PARTICLE_RADIUS + Math.random() * 3
        this.trail = []
        this.age = 0
      }

      update(dt) {
        // Apply gravity
        this.vy += gravity * 30 * dt

        // Apply friction
        this.vx *= (1 - friction * 30 * dt)
        this.vy *= (1 - friction * 30 * dt)

        // Integrate
        this.x += this.vx * 30 * dt
        this.y += this.vy * 30 * dt

        // Wall collisions
        if (this.x - this.radius < 0) {
          this.x = this.radius
          this.vx = Math.abs(this.vx) * bounce
        }
        if (this.x + this.radius > W) {
          this.x = W - this.radius
          this.vx = -Math.abs(this.vx) * bounce
        }
        if (this.y - this.radius < 0) {
          this.y = this.radius
          this.vy = Math.abs(this.vy) * bounce
        }
        if (this.y + this.radius > H) {
          this.y = H - this.radius
          this.vy = -Math.abs(this.vy) * bounce

          // Add some horizontal friction on ground
          this.vx *= 0.95
        }

        // Trail
        this.trail.push({ x: this.x, y: this.y })
        if (this.trail.length > TRAIL_LENGTH) {
          this.trail.shift()
        }

        this.age += dt
      }

      getSpeed() {
        return Math.sqrt(this.vx ** 2 + this.vy ** 2)
      }

      getColor() {
        const speed = this.getSpeed()
        // Map speed to color: slow=green, medium=yellow, fast=red
        const maxSpeed = 15
        const t = Math.min(speed / maxSpeed, 1)

        if (t < 0.5) {
          const r = Math.round(t * 2 * 248)
          const g = 255
          const b = Math.round(136 * (1 - t * 2))
          return `rgb(${r},${g},${b})`
        } else {
          const s = (t - 0.5) * 2
          const r = 248
          const g = Math.round(255 * (1 - s))
          const b = Math.round(136 * (1 - s))
          return `rgb(${r},${g},${b})`
        }
      }
    }

    // ── Spawn particles ───────────────────────────────────────────────
    function spawnParticles(count) {
      for (let i = 0; i < count; i++) {
        const margin = 40
        const x = margin + Math.random() * (W - margin * 2)
        const y = margin + Math.random() * (H * 0.4)
        particles.push(new Particle(x, y))
      }
    }

    function ensureCount() {
      const diff = targetCount - particles.length
      if (diff > 0) {
        spawnParticles(diff)
      } else if (diff < 0) {
        particles = particles.slice(0, targetCount)
      }
    }

    function burst() {
      const cx = W / 2, cy = H / 2
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2
        const speed = 3 + Math.random() * 10
        const p = new Particle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed - 3)
        particles.push(p)
      }
      // Trim to target count
      if (particles.length > targetCount + 30) {
        particles = particles.slice(particles.length - targetCount)
      }
    }

    // ── Render ────────────────────────────────────────────────────────
    let trailCanvas = null
    let trailCtx = null

    function render() {
      ctx.clearRect(0, 0, W, H)

      // Background grid
      ctx.strokeStyle = '#1a1a28'
      ctx.lineWidth = 0.5
      const gridSize = 40
      for (let x = gridSize; x < W; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke()
      }
      for (let y = gridSize; y < H; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke()
      }

      // Draw trails
      for (const p of particles) {
        if (p.trail.length < 2) continue
        const color = p.getColor()
        for (let i = 1; i < p.trail.length; i++) {
          const alpha = i / p.trail.length
          const t = p.trail[i]
          const prev = p.trail[i - 1]
          ctx.strokeStyle = color.replace('rgb', 'rgba').replace(')', `,${(alpha * 0.6).toFixed(2)})`)
          ctx.lineWidth = p.radius * 0.7
          ctx.beginPath()
          ctx.moveTo(prev.x, prev.y)
          ctx.lineTo(t.x, t.y)
          ctx.stroke()
        }
      }

      // Draw particles
      for (const p of particles) {
        const color = p.getColor()
        const speed = p.getSpeed()

        // Glow
        const glowGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.5)
        glowGrad.addColorStop(0, color.replace('rgb', 'rgba').replace(')', ',0.4)'))
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)')
        ctx.fillStyle = glowGrad
        ctx.beginPath()
        ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2)
        ctx.fill()

        // Core
        ctx.fillStyle = color
        ctx.beginPath()
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2)
        ctx.fill()

        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.5)'
        ctx.beginPath()
        ctx.arc(p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.35, 0, Math.PI * 2)
        ctx.fill()
      }

      // Stats
      const avgSpeed = particles.length > 0
        ? particles.reduce((s, p) => s + p.getSpeed(), 0) / particles.length
        : 0
      const maxSpeed = particles.length > 0
        ? Math.max(...particles.map(p => p.getSpeed()))
        : 0
      const totalKE = particles.reduce((s, p) => s + 0.5 * (p.vx ** 2 + p.vy ** 2), 0)

      document.getElementById('info').innerHTML = `
        <div class="stat"><span class="stat-label">Particles:</span><span class="stat-value">${particles.length}</span></div>
        <div class="stat"><span class="stat-label">Avg Speed:</span><span class="stat-value">${avgSpeed.toFixed(1)}</span></div>
        <div class="stat"><span class="stat-label">Max Speed:</span><span class="stat-value">${maxSpeed.toFixed(1)}</span></div>
        <div class="stat"><span class="stat-label">Total KE:</span><span class="stat-value">${totalKE.toFixed(0)}</span></div>
        <div class="stat"><span class="stat-label">Gravity:</span><span class="stat-value">${gravity.toFixed(2)}</span></div>
        <div class="stat"><span class="stat-label">Bounce:</span><span class="stat-value">${bounce.toFixed(2)}</span></div>
      `
    }

    // ── Update ────────────────────────────────────────────────────────
    function update(dt) {
      ensureCount()
      for (const p of particles) {
        p.update(dt)
      }
    }

    // ── Tick loop ─────────────────────────────────────────────────────
    let lastTime = 0
    function tick(now) {
      if (lastTime === 0) lastTime = now
      const rawDt = (now - lastTime) / 1000
      lastTime = now

      if (playing) {
        // Sub-stepping for stability
        const subSteps = 2
        const dt = rawDt / subSteps
        for (let i = 0; i < subSteps; i++) {
          update(dt)
        }
      }

      render()
      requestAnimationFrame(tick)
    }

    // ── Controls ──────────────────────────────────────────────────────
    function bindControls() {
      const gravitySlider = document.getElementById('gravity')
      const bounceSlider = document.getElementById('bounce')
      const frictionSlider = document.getElementById('friction')
      const countSlider = document.getElementById('particleCount')

      gravitySlider.addEventListener('input', () => {
        gravity = Number(gravitySlider.value)
        document.getElementById('gravVal').textContent = gravity.toFixed(2)
      })
      bounceSlider.addEventListener('input', () => {
        bounce = Number(bounceSlider.value)
        document.getElementById('bounceVal').textContent = bounce.toFixed(2)
      })
      frictionSlider.addEventListener('input', () => {
        friction = Number(frictionSlider.value)
        document.getElementById('fricVal').textContent = friction.toFixed(3)
      })
      countSlider.addEventListener('input', () => {
        targetCount = Number(countSlider.value)
        document.getElementById('countVal').textContent = targetCount
      })

      document.getElementById('playBtn').addEventListener('click', function() {
        playing = !playing
        this.textContent = playing ? '⏸ Pause' : '▶ Play'
        this.classList.toggle('active', !playing)
      })

      document.getElementById('resetBtn').addEventListener('click', () => {
        particles = []
        spawnParticles(targetCount)
      })

      document.getElementById('burstBtn').addEventListener('click', () => {
        burst()
      })
    }

    // ── Mouse interaction ─────────────────────────────────────────────
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect()
      const x = e.clientX - rect.left
      const y = e.clientY - rect.top
      // Spawn a few particles at click location
      for (let i = 0; i < 5; i++) {
        const p = new Particle(
          x + (Math.random() - 0.5) * 10,
          y + (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 3,
          (Math.random() - 0.5) * 3 - 2
        )
        particles.push(p)
      }
      if (particles.length > targetCount + 10) {
        particles = particles.slice(particles.length - targetCount)
      }
    })

    // ── Keyboard ──────────────────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
      switch (e.key) {
        case ' ':
          playing = !playing
          document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Play'
          e.preventDefault()
          break
        case 'ArrowUp':
          gravity = Math.min(2, gravity + 0.1)
          document.getElementById('gravity').value = gravity
          document.getElementById('gravVal').textContent = gravity.toFixed(2)
          break
        case 'ArrowDown':
          gravity = Math.max(0, gravity - 0.1)
          document.getElementById('gravity').value = gravity
          document.getElementById('gravVal').textContent = gravity.toFixed(2)
          break
        case 'b':
          burst()
          break
      }
    })

    // ── Init ──────────────────────────────────────────────────────────
    function resize() {
      const stage = canvas.parentElement
      canvas.width = W = stage.clientWidth
      canvas.height = H = stage.clientHeight
      // Re-spawn particles in new bounds
      particles = []
      spawnParticles(targetCount)
    }

    window.addEventListener('resize', resize)
    resize()
    bindControls()
    requestAnimationFrame(tick)

    console.log('%c⚛️ Particle Simulation%c | gravity, bounce, friction, trails', 'color:#4f8', '')
    console.log('  Controls: sliders | play/pause | click to spawn | Space = pause | ↑↓ gravity | B = burst')
    console.log('  Using @uploop/timeline easing & @uploop/compositor blendModes')
  </script>
</body>
</html>
