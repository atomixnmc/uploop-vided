<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fade Transitions — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .stage {
      position: relative;
      width: min(600px, 85vw);
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      background: #151520;
    }
    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      opacity: 0;
      transition: none;
    }
    .panel-a {
      background: linear-gradient(135deg, #1a3a5c, #0d2137);
    }
    .panel-b {
      background: linear-gradient(135deg, #3a1a5c, #210d37);
    }
    .panel-label {
      font-size: 1.5rem;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover { background: #252540; color: #fff; }
    button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .progress-bar {
      width: min(600px, 85vw);
      height: 6px;
      background: #1a1a2e;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4f8;
      border-radius: 3px;
      width: 0%;
      transition: none;
    }
    .info {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="stage">
    <div class="panel panel-a">
      <span class="panel-label">Panel A</span>
    </div>
    <div class="panel panel-b">
      <span class="panel-label">Panel B</span>
    </div>
  </div>
  <div class="controls">
    <button id="fade-btn">Fade</button>
    <button id="dissolve-btn">Dissolve</button>
    <button id="reset-btn">Reset</button>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="info">
    Using <code>createTransition</code> from <code>@uploop/compositor</code>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
