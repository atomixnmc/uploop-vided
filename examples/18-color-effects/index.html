<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Effects — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
    }
    .stage {
      width: min(500px, 90vw);
      height: min(400px, 50vh);
      background: #151520;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      max-width: 500px;
    }
    .presets button {
      background: #151520;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .presets button:hover { background: #1e1e30; }
    .presets button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: min(500px, 90vw);
    }
    .slider-row label { font-size: 13px; color: #888; white-space: nowrap; }
    .slider-row input[type="range"] { flex: 1; accent-color: #4f8; }
    .slider-row span { font-size: 13px; color: #4f8; width: 32px; text-align: right; }
    .info {
      font-size: 13px;
      color: #666;
    }
    .info code { color: #4f8; }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="stage">
    <canvas id="canvas"></canvas>
  </div>
  <div class="presets">
    <button data-effect="none" class="active">✨ None</button>
    <button data-effect="sepia">🟤 Sepia</button>
    <button data-effect="grayscale">⬜ Grayscale</button>
    <button data-effect="invert">🔄 Invert</button>
    <button data-effect="vintage">📷 Vintage</button>
    <button data-effect="cool">❄️ Cool</button>
    <button data-effect="warm">🔥 Warm</button>
  </div>
  <div class="slider-row">
    <label for="intensity">Intensity</label>
    <input type="range" id="intensity" min="0" max="100" value="80">
    <span id="intensity-val">80%</span>
  </div>
  <div class="info">
    Using <code>Effect</code> from <code>@uploop/compositor</code> with CSS filter pipeline
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
