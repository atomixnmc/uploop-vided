<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyframe Animation — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .stage {
      width: min(800px, 90vw);
      background: #151520;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .canvas-area {
      aspect-ratio: 16/9;
      background: #0d0d18;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .animated-box {
      position: absolute;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4f8, #2af);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #0a0a0f;
    }
    .transport {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .transport button {
      background: #2a2a3a;
      border: none;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .transport button:hover { background: #3a3a50; }
    .transport button.playing { background: #4f8; color: #0a0a0f; }
    .timecode {
      font-family: monospace;
      font-size: 14px;
      color: #888;
      margin-left: auto;
    }
    .keyframe-editor {
      background: #0d0d18;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .keyframe-editor h3 {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .prop-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .prop-row .prop-name {
      width: 70px;
      color: #888;
    }
    .kf-bar {
      flex: 1;
      height: 24px;
      background: #151520;
      border-radius: 4px;
      position: relative;
      cursor: pointer;
    }
    .kf-point {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #4f8;
      border: 2px solid #0a0a0f;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 2;
      transition: transform 0.1s;
    }
    .kf-point:hover { transform: translate(-50%, -50%) scale(1.4); }
    .info {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <h1>Keyframe Animation</h1>
  <p class="subtitle">Interpolation for x, y, opacity, scale</p>
  <div class="stage">
    <div class="canvas-area" id="canvasArea">
      <div class="animated-box" id="animBox">Uploop</div>
    </div>
    <div class="transport">
      <button id="btnPlay">▶ Play</button>
      <button id="btnStop">■ Stop</button>
      <button id="btnLoop">🔁 Loop</button>
      <span class="timecode" id="timecode">00:00.00 / 00:03.00</span>
    </div>
    <div class="keyframe-editor" id="kfEditor">
      <h3>Keyframe Tracks</h3>
    </div>
  </div>
  <div class="info">
    Using <code>@uploop/timeline</code> — Keyframe · KeyframeTrack interpolation
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
