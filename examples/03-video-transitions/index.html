<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transitions — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .stage {
      width: min(800px, 90vw);
      background: #151520;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .player {
      position: relative;
      aspect-ratio: 16/9;
      background: #0d0d18;
      border-radius: 8px;
      overflow: hidden;
    }
    .player video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: none;
    }
    .transition-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #4f8;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .transition-label.visible { opacity: 1; }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .controls button {
      background: #2a2a3a;
      border: none;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .controls button:hover { background: #3a3a50; }
    .controls button:disabled { opacity: 0.3; cursor: default; }
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .playlist {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .playlist .thumb {
      width: 120px;
      aspect-ratio: 16/9;
      background: #0d0d18;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .playlist .thumb.active { border-color: #4f8; }
    .playlist .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .playlist .thumb .idx {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 11px;
      background: rgba(0,0,0,0.7);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .transition-select {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .transition-select select {
      background: #2a2a3a;
      color: #e0e0e0;
      border: 1px solid #3a3a50;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    .info {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <h1>Video Transitions</h1>
  <p class="subtitle">Playlist with fade transitions between clips</p>
  <div class="stage">
    <div class="player">
      <video id="videoA" muted playsinline></video>
      <video id="videoB" muted playsinline></video>
      <div class="transition-label" id="transitionLabel">Fade</div>
    </div>
    <div class="controls">
      <button id="btnPrev" disabled>◀ Prev</button>
      <button id="btnPlay">▶ Play</button>
      <button id="btnNext">Next ▶</button>
      <div class="transition-select">
        <label for="selTransition">Transition:</label>
        <select id="selTransition">
          <option value="fade" selected>Fade</option>
          <option value="dissolve">Dissolve</option>
          <option value="slideLeft">Slide Left</option>
          <option value="slideRight">Slide Right</option>
          <option value="slideUp">Slide Up</option>
          <option value="zoomIn">Zoom In</option>
          <option value="none">Cut</option>
        </select>
      </div>
    </div>
    <div class="playlist" id="playlist"></div>
  </div>
  <div class="info">
    Using <code>@uploop/compositor</code> — createTransition for fade transitions
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
