<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Wall — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    h2 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: #aaa;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      width: min(800px, 90vw);
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    .cell {
      background: #151520;
      overflow: hidden;
      position: relative;
    }
    .cell video,
    .cell canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cell .label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 3px;
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      padding: 10px 24px;
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover { background: #252540; color: #fff; }
    button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .info {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <h2>Video Wall — 2×2 Grid</h2>
  <div class="grid" id="grid">
    <div class="cell">
      <video src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_2MB.mp4" muted loop playsinline></video>
      <span class="label">Big Buck Bunny</span>
    </div>
    <div class="cell">
      <video src="https://test-videos.co.uk/vids/jellyfish/mp4/h264/720/Jellyfish_720_10s_2MB.mp4" muted loop playsinline></video>
      <span class="label">Jellyfish</span>
    </div>
    <div class="cell">
      <video src="https://test-videos.co.uk/vids/sintel/mp4/h264/720/Sintel_720_10s_2MB.mp4" muted loop playsinline></video>
      <span class="label">Sintel</span>
    </div>
    <div class="cell" id="placeholder-cell">
      <canvas id="placeholder-canvas"></canvas>
      <span class="label">Canvas Placeholder</span>
    </div>
  </div>
  <div class="controls">
    <button id="toggle-btn" class="active">⏸ Pause All</button>
  </div>
  <div class="info">
    Simultaneous multi-video playback with canvas placeholder
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
