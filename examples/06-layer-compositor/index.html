<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer Compositor — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .stage {
      width: min(800px, 90vw);
      background: #151520;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .viewport {
      aspect-ratio: 16/9;
      background: #0d0d18;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .layer-el {
      position: absolute;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      transition: none;
      pointer-events: none;
    }
    .viewport .label {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 11px;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 10px;
      color: #aaa;
    }
    .layer-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .layer-panel h3 {
      font-size: 13px;
      color: #888;
      margin-bottom: 2px;
    }
    .layer-control {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #0d0d18;
      border-radius: 8px;
      font-size: 13px;
    }
    .layer-control .lname {
      width: 90px;
      font-weight: 600;
    }
    .layer-control input[type="range"] {
      flex: 1;
      accent-color: #4f8;
    }
    .layer-control .op-val {
      width: 36px;
      font-size: 12px;
      color: #888;
      text-align: right;
    }
    .layer-control button {
      background: none;
      border: 1px solid #3a3a50;
      color: #e0e0e0;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .layer-control button:hover { background: #2a2a3a; }
    .layer-control button.hidden { background: #3a1a1a; border-color: #5c2a2a; }
    .layer-control .order-btn {
      width: 28px;
      padding: 4px 0;
      font-size: 14px;
    }
    .info {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <h1>Layer Compositor</h1>
  <p class="subtitle">Multi-layer compositing with toggles &amp; opacity</p>
  <div class="stage">
    <div class="viewport" id="viewport">
      <span class="label">Composite Viewport</span>
    </div>
    <div class="layer-panel" id="layerPanel">
      <h3>Layers (bottom → top)</h3>
    </div>
  </div>
  <div class="info">
    Using <code>@uploop/compositor</code> — Compositor · Layer for multi-layer compositing
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
