<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multitrack Timeline — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .stage {
      width: min(800px, 90vw);
      background: #151520;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .preview {
      aspect-ratio: 16/9;
      background: #0d0d18;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .clip-block {
      position: absolute;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .transport {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .transport button {
      background: #2a2a3a;
      border: none;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .transport button:hover { background: #3a3a50; }
    .transport button.running { background: #4f8; color: #0a0a0f; }
    .timecode {
      font-family: monospace;
      font-size: 14px;
      color: #888;
      margin-left: auto;
    }
    .timeline-viz {
      position: relative;
      height: 100px;
      background: #0d0d18;
      border-radius: 8px;
      overflow: hidden;
    }
    .timeline-viz .track-row {
      position: absolute;
      left: 0;
      right: 0;
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      color: #888;
    }
    .timeline-viz .clip-bar {
      position: absolute;
      height: 20px;
      border-radius: 4px;
      top: 4px;
    }
    .timeline-viz .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #f44;
      z-index: 2;
    }
    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #888;
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .legend .swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
    }
    .info {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <h1>Multitrack Timeline</h1>
  <p class="subtitle">3 tracks: video · text overlay · audio</p>
  <div class="stage">
    <div class="preview" id="preview"></div>
    <div class="transport">
      <button id="btnPlay">▶ Play</button>
      <button id="btnStop">■ Stop</button>
      <span class="timecode" id="timecode">00:00.00 / 00:10.00</span>
    </div>
    <div class="timeline-viz" id="timelineViz">
      <div class="playhead" id="playhead"></div>
    </div>
    <div class="legend">
      <span><span class="swatch" style="background:#3a6fc5"></span> Video layer</span>
      <span><span class="swatch" style="background:#c54f3a"></span> Text overlay</span>
      <span><span class="swatch" style="background:#3ac54f"></span> Audio layer</span>
    </div>
  </div>
  <div class="info">
    Using <code>@uploop/timeline</code> — Timeline · Track · Clip
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
