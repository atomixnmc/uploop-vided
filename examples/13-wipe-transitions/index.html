<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wipe Transitions — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .stage {
      position: relative;
      width: min(600px, 85vw);
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      background: #151520;
    }
    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      opacity: 1;
      transition: none;
    }
    .panel-a {
      background: linear-gradient(135deg, #1a5c3a, #0d3721);
    }
    .panel-b {
      background: linear-gradient(135deg, #5c3a1a, #37210d);
    }
    .panel-label {
      font-size: 1.5rem;
      opacity: 0.8;
    }
    .direction-indicator {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 4px;
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover { background: #252540; color: #fff; }
    button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .arrow { font-size: 16px; }
    .info {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="stage">
    <div class="panel panel-a">
      <span class="panel-label">Panel A</span>
    </div>
    <div class="panel panel-b">
      <span class="panel-label">Panel B</span>
    </div>
    <div class="direction-indicator" id="indicator">⏺ idle</div>
  </div>
  <div class="controls">
    <button id="wipe-left"><span class="arrow">←</span> Left</button>
    <button id="wipe-right"><span class="arrow">→</span> Right</button>
    <button id="wipe-up"><span class="arrow">↑</span> Up</button>
    <button id="wipe-down"><span class="arrow">↓</span> Down</button>
    <button id="reset-btn">Reset</button>
  </div>
  <div class="info">
    Using <code>createTransition</code> from <code>@uploop/compositor</code>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
