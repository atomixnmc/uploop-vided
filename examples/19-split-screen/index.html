<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Screen — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }
    .stage {
      width: min(720px, 90vw);
      height: min(420px, 55vh);
      background: #151520;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      display: flex;
    }
    .split-half {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .split-half video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    .split-half.left video { object-position: left center; }
    .split-half.right video { object-position: right center; }
    .divider {
      width: 4px;
      background: #4f8;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      transition: background 0.15s;
    }
    .divider:hover { background: #8f8; }
    .divider::after {
      content: '';
      position: absolute;
      inset: -8px -6px;
    }
    .divider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      background: #4f8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #0a0a0f;
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .controls button {
      background: #151520;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .controls button:hover { background: #1e1e30; }
    .controls button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .split-pct {
      font-size: 14px;
      color: #888;
    }
    .split-pct span { color: #4f8; font-weight: 600; }
    .info {
      font-size: 13px;
      color: #666;
    }
    .info code { color: #4f8; }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="stage" id="stage">
    <div class="split-half left" id="split-left">
      <video src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4" muted loop playsinline></video>
    </div>
    <div class="divider" id="divider">
      <div class="divider-handle">⟷</div>
    </div>
    <div class="split-half right" id="split-right">
      <video src="https://test-videos.co.uk/vids/jellyfish/mp4/h264/360/Jellyfish_360_10s_1MB.mp4" muted loop playsinline></video>
    </div>
  </div>
  <div class="controls">
    <button id="btn-play">▶ Play</button>
    <button id="btn-orient" class="active">⬌ Horizontal</button>
    <button id="btn-reset">↺ Reset 50/50</button>
  </div>
  <div class="split-pct">
    Split: <span id="split-label">50%</span> / <span id="split-label-r">50%</span>
  </div>
  <div class="info">
    Split-screen compositing — draggable divider, toggle orientation
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
