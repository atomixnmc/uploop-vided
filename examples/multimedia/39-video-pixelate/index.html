<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Pixelate — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 14px;
    }
    .back { position: fixed; top: 16px; left: 16px; color: #888; text-decoration: none; font-size: 14px; z-index: 100; }
    .back:hover { color: #fff; }
    .title-bar { width: min(960px, 90vw); display: flex; align-items: center; justify-content: space-between; }
    .title-bar h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    .title-bar span { font-size: 12px; color: #666; }
    canvas {
      width: min(960px, 90vw); height: 480px;
      background: #151520; border-radius: 12px; border: 1px solid #252535; display: block;
      image-rendering: auto;
    }
    .controls {
      width: min(960px, 90vw); background: #151520; border-radius: 10px;
      padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .control-group { display: flex; flex-direction: column; gap: 3px; }
    .control-group label { font-size: 11px; color: #888; }
    .control-group .val { font-size: 11px; color: #4f8; font-family: 'Courier New', monospace; }
    .control-group input[type="range"] { accent-color: #4f8; width: 100px; }
    button {
      background: #1e1e30; color: #e0e0e0; border: 1px solid #333;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: all 0.2s; white-space: nowrap;
    }
    button:hover { background: #2a2a40; }
    button.playing { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    button.mode-active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .preset-btns { display: flex; gap: 4px; }
    .preset-btns button { padding: 6px 12px; font-size: 11px; font-family: 'Courier New', monospace; }
    .info-box {
      width: min(960px, 90vw); background: #0f0f1a; border: 1px solid #252535;
      border-radius: 8px; padding: 10px 18px; font-size: 12px; color: #aaa;
      display: flex; gap: 24px; flex-wrap: wrap;
    }
    .info-box span { color: #f8c040; font-family: 'Courier New', monospace; }
    .info-box code { color: #4f8; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <div id="root"></div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'
    import { blendModes } from '@uploop/compositor'

    const BBB_VIDEO = 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4'

    const VideoPixelate = component('VideoPixelate', {
      state: {
        playing: false, blockSize: 8, smooth: false,
        region: 'full', fps: 0,
        preset: 'custom',
      },
      update: {
        togglePlay: (s) => ({ ...s, playing: !s.playing }),
        setPlaying: (s, p) => ({ ...s, playing: p }),
        setBlockSize: (s, v) => ({ ...s, blockSize: v, preset: 'custom' }),
        toggleSmooth: (s) => ({ ...s, smooth: !s.smooth }),
        setRegion: (s, v) => ({ ...s, region: v }),
        setPreset: (s, name, size) => ({ ...s, preset: name, blockSize: size }),
        setFps: (s, v) => ({ ...s, fps: v }),
      },
      view: (state, { send }) => html`
        <div class="title-bar">
          <h1>👾 Video Pixelate — Mosaic Effect</h1>
          <span>Resolution Presets · Region Mask · Smooth/Hard</span>
        </div>
        <canvas id="viz"></canvas>
        <div class="controls">
          <button id="playBtn" class="${state.playing ? 'playing' : ''}" onclick=${() => send('togglePlay')}>
            ${state.playing ? '⏸ Pause' : '▶ Play'}
          </button>
          <div class="control-group">
            <label>Block Size <span class="val">${state.blockSize}px</span></label>
            <input type="range" min="1" max="64" step="1" value="${state.blockSize}"
              oninput=${(e) => send('setBlockSize', Number(e.target.value))} />
          </div>
          <button class="${state.smooth ? 'mode-active' : ''}" onclick=${() => send('toggleSmooth')}>
            ${state.smooth ? '◉ Smooth' : '◻ Hard'}
          </button>
          <div class="mode-btns" style="display:flex;gap:4px;">
            ${[{ k: 'full', n: 'Full' }, { k: 'left', n: 'Left' }, { k: 'center', n: 'Center' }].map(r => html`
              <button class="${state.region === r.k ? 'mode-active' : ''}" onclick=${() => send('setRegion', r.k)} style="font-size:11px;padding:6px 10px;">${r.n}</button>
            `)}
          </div>
          <div class="preset-btns">
            ${[{ n: '8-bit', s: 16 }, { n: '16-bit', s: 8 }, { n: '32-bit', s: 4 }, { n: 'HD', s: 1 }].map(p => html`
              <button class="${state.preset === p.n ? 'mode-active' : ''}" onclick=${() => send('setPreset', p.n, p.s)}>${p.n}</button>
            `)}
          </div>
        </div>
        <div class="info-box">
          <div>FPS: <span id="fpsVal">0</span></div>
          <div>Effective Res: <span id="resInfo">-</span></div>
          <div>Using <code>@uploop/timeline</code> · <code>@uploop/compositor</code></div>
        </div>
      `,
      mount(el, ctx) {
        const canvas = el.querySelector('#viz')
        const c = canvas.getContext('2d')
        let video, W, H, fpsCounter = 0, fpsTime = 0
        let smallCanvas, smallCtx

        function resize() {
          const rect = canvas.getBoundingClientRect()
          canvas.width = W = rect.width * devicePixelRatio
          canvas.height = H = rect.height * devicePixelRatio
          smallCanvas = document.createElement('canvas')
          smallCtx = smallCanvas.getContext('2d')
        }

        function loadVideo() {
          video = document.createElement('video')
          video.crossOrigin = 'anonymous'; video.src = BBB_VIDEO
          video.loop = true; video.muted = true; video.playsInline = true
          video.addEventListener('loadedmetadata', () => {
            resize()
            video.play(); ctx.send('setPlaying', true); loop()
          })
        }

        function pixelateRegion(blockSize, region) {
          const s = ctx.get()
          // Full pixelation path
          if (region === 'full') {
            const bs = blockSize
            if (bs <= 1) {
              c.drawImage(video, 0, 0, W, H)
              return
            }
            const sw = Math.ceil(W / bs)
            const sh = Math.ceil(H / bs)
            smallCanvas.width = sw
            smallCanvas.height = sh
            smallCtx.imageSmoothingEnabled = false
            smallCtx.drawImage(video, 0, 0, sw, sh)
            c.imageSmoothingEnabled = s.smooth
            c.drawImage(smallCanvas, 0, 0, W, H)
            c.imageSmoothingEnabled = true
          } else {
            // Draw original first
            c.drawImage(video, 0, 0, W, H)

            // Define region
            let rx, ry, rw, rh
            if (region === 'left') {
              rx = 0; ry = 0; rw = W / 2; rh = H
            } else if (region === 'center') {
              rw = W * 0.5; rh = H * 0.5
              rx = (W - rw) / 2; ry = (H - rh) / 2
            }

            if (blockSize <= 1) return

            // Pixelate the region
            const bs = blockSize
            const sw = Math.ceil(rw / bs)
            const sh = Math.ceil(rh / bs)
            smallCanvas.width = sw
            smallCanvas.height = sh

            // Draw only the region from video to small canvas
            smallCtx.imageSmoothingEnabled = false
            smallCtx.drawImage(video, rx / W * video.videoWidth, ry / H * video.videoHeight,
              rw / W * video.videoWidth, rh / H * video.videoHeight,
              0, 0, sw, sh)

            // Draw back upscaled
            c.imageSmoothingEnabled = s.smooth
            c.drawImage(smallCanvas, rx, ry, rw, rh)
            c.imageSmoothingEnabled = true

            // Border around pixelated region
            c.strokeStyle = '#4f8'
            c.lineWidth = 2
            c.strokeRect(rx, ry, rw, rh)
          }
        }

        function render() {
          if (!video || video.readyState < 2) return
          c.clearRect(0, 0, W, H)
          pixelateRegion(ctx.get().blockSize, ctx.get().region)

          const bs = ctx.get().blockSize
          el.querySelector('#resInfo').textContent = `${Math.floor(W / bs)}×${Math.floor(H / bs)}`

          fpsCounter++
          const now = performance.now()
          if (now - fpsTime >= 1000) {
            el.querySelector('#fpsVal').textContent = Math.round(fpsCounter / ((now - fpsTime) / 1000))
            fpsCounter = 0; fpsTime = now
          }
        }

        function loop() {
          render()
          loop._raf = requestAnimationFrame(loop)
        }

        const origSend = ctx.send
        ctx.send = function(action, payload) {
          if (action === 'togglePlay') {
            if (video) { video.paused ? video.play() : video.pause(); origSend('setPlaying', !video.paused) }
          }
          origSend(action, payload)
        }

        resize(); loadVideo()
        window.addEventListener('resize', resize)
        return () => {
          if (loop._raf) cancelAnimationFrame(loop._raf)
          if (video) { video.pause(); video.src = '' }
          window.removeEventListener('resize', resize)
        }
      }
    })

    VideoPixelate.mount(document.getElementById('root'))
  </script>
</body>
</html>
