<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Typewriter Effect — uploop-vided</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                color: #e0e0e0;
                font-family: "Courier New", monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 24px 40px;
                gap: 16px;
            }
            .back {
                position: fixed;
                top: 16px;
                left: 16px;
                color: #888;
                text-decoration: none;
                font-size: 14px;
                z-index: 100;
            }
            .back:hover {
                color: #fff;
            }
            h1 {
                font-size: 1.25rem;
                font-weight: 600;
                color: #4f8;
            }
            .stage {
                width: min(700px, 90vw);
                min-height: 200px;
                background: #151520;
                border-radius: 12px;
                border: 1px solid #1a1a2e;
                padding: 32px;
                display: flex;
                align-items: center;
                position: relative;
            }
            .typewriter-text {
                font-size: 1.3rem;
                line-height: 1.8;
                white-space: pre-wrap;
                color: #e0e0e0;
            }
            .cursor {
                display: inline-block;
                width: 10px;
                height: 1.3rem;
                background: #4f8;
                vertical-align: text-bottom;
                margin-left: 2px;
                border-radius: 2px;
            }
            .cursor.blink {
                animation: blink 0.8s step-end infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }
            .controls {
                width: min(700px, 90vw);
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
                justify-content: center;
            }
            .controls button {
                background: #151520;
                color: #e0e0e0;
                border: 1px solid #2a2a40;
                padding: 6px 14px;
                border-radius: 6px;
                font-size: 13px;
                cursor: pointer;
                font-family: system-ui, sans-serif;
            }
            .controls button.active {
                background: #4f8;
                color: #0a0a0f;
                border-color: #4f8;
            }
            .controls input,
            .controls select {
                background: #151520;
                color: #e0e0e0;
                border: 1px solid #2a2a40;
                padding: 6px 10px;
                border-radius: 6px;
                font-size: 13px;
                font-family: system-ui, sans-serif;
            }
            .controls input[type="range"] {
                accent-color: #4f8;
            }
            .controls label {
                font-size: 12px;
                color: #888;
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .info {
                font-size: 12px;
                color: #555;
                margin-top: 4px;
            }
        </style>
    </head>
    <body>
        <a href="../.." class="back">← Examples</a>
        <h1>43 · Typewriter Effect</h1>
        <div class="stage" data-ref="stage"></div>
        <div class="controls" id="controls"></div>
        <div class="info">
            Character-by-character reveal · @uploop/timeline easing
        </div>

        <script type="module">
            import { html, component } from "@uploop/html";
            import { easing } from "@uploop/timeline";

            const TEXTS = [
                "Hello, world! This is the uploop-vided typewriter effect.\nEach character appears one at a time, just like a real typewriter.",
                "> npm install @uploop/vided\n> pnpm dev\n\nBuilding the future of multimedia editing on the web.",
                "The quick brown fox jumps over the lazy dog.\nABCDEFGHIJKLMNOPQRSTUVWXYZ\n0123456789 !@#$%^&*()",
                "function animate() {\n  const now = performance.now()\n  const dt = (now - last) / 1000\n  update(dt)\n  render()\n  requestAnimationFrame(animate)\n}",
            ];

            const CLICK_SOUND =
                "data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4=";

            const Demo = component("Typewriter", {
                state: {
                    charIndex: 0,
                    textIdx: 0,
                    speed: 40, // ms per char
                    playing: true,
                    soundOn: false,
                    textColor: "#4f8",
                    bgColor: "#151520",
                    mode: "type", // 'type' | 'delete'
                },
                update: {
                    tick(s) {
                        if (!s.playing) return s;
                        const currentText = TEXTS[s.textIdx];
                        if (s.mode === "type") {
                            if (s.charIndex >= currentText.length)
                                return { ...s, playing: false };
                            return { ...s, charIndex: s.charIndex + 1 };
                        } else {
                            if (s.charIndex <= 0)
                                return {
                                    ...s,
                                    charIndex: 0,
                                    playing: false,
                                    mode: "type",
                                };
                            return { ...s, charIndex: s.charIndex - 1 };
                        }
                    },
                    setSpeed: (s, v) => ({ ...s, speed: parseInt(v) }),
                    setText: (s, idx) => ({
                        ...s,
                        textIdx: parseInt(idx),
                        charIndex: 0,
                        mode: "type",
                        playing: true,
                    }),
                    togglePlay: (s) => ({ ...s, playing: !s.playing }),
                    restart: (s) => ({
                        ...s,
                        charIndex: 0,
                        mode: "type",
                        playing: true,
                    }),
                    toggleSound: (s) => ({ ...s, soundOn: !s.soundOn }),
                    setTextColor: (s, c) => ({ ...s, textColor: c }),
                    setBgColor: (s, c) => ({ ...s, bgColor: c }),
                    toggleMode: (s) => ({
                        ...s,
                        mode: s.mode === "type" ? "delete" : "type",
                        playing: true,
                    }),
                },
                view: (state, { send }) => {
                    const currentText = TEXTS[state.textIdx];
                    const shown =
                        state.mode === "type"
                            ? currentText.slice(0, state.charIndex)
                            : "";
                    const lines = shown.split("\n");
                    return html`
                        <a href="../.." class="back">← Examples</a>
                        <h1>43 · Typewriter Effect</h1>
                        <div class="stage" style="background:${state.bgColor};">
                            <div
                                class="typewriter-text"
                                style="color:${state.textColor};"
                            >
                                ${lines.flatMap((line, i) =>
                                    i > 0 ? [html`<br />`, line] : [line],
                                )}
                                <span class="cursor blink"></span>
                            </div>
                        </div>
                        <div class="controls">
                            <button
                                @click=${() => send("togglePlay")}
                                class=${state.playing ? "active" : ""}
                            >
                                ${state.playing ? "⏸ Pause" : "▶ Resume"}
                            </button>
                            <button @click=${() => send("restart")}>
                                ↺ Restart
                            </button>
                            <button
                                @click=${() => send("toggleMode")}
                                class=${state.mode === "delete" ? "active" : ""}
                            >
                                ${state.mode === "type" ? "⌫ Delete" : "⌨ Type"}
                            </button>
                            <select
                                @change=${(e) =>
                                    send("setText", e.target.value)}
                            >
                                ${TEXTS.map(
                                    (t, i) =>
                                        html`<option
                                            value="${i}"
                                            selected=${state.textIdx === i}
                                        >
                                            Text ${i + 1}
                                        </option>`,
                                )}
                            </select>
                            <label
                                >Speed
                                <input
                                    type="range"
                                    min="5"
                                    max="200"
                                    step="5"
                                    value="${state.speed}"
                                    @input=${(e) =>
                                        send("setSpeed", e.target.value)}
                            /></label>
                            <button
                                @click=${() => send("toggleSound")}
                                class=${state.soundOn ? "active" : ""}
                            >
                                ${state.soundOn ? "🔊 Sound" : "🔇 Sound"}
                            </button>
                            <label
                                >Color
                                <input
                                    type="color"
                                    value="${state.textColor}"
                                    @input=${(e) =>
                                        send("setTextColor", e.target.value)}
                                    style="width:32px;height:24px;padding:0;border:none;"
                            /></label>
                            <label
                                >BG
                                <input
                                    type="color"
                                    value="${state.bgColor}"
                                    @input=${(e) =>
                                        send("setBgColor", e.target.value)}
                                    style="width:32px;height:24px;padding:0;border:none;"
                            /></label>
                        </div>
                        <div class="info">
                            Character-by-character reveal · @uploop/timeline
                            easing
                        </div>
                    `;
                },
                mount(el, ctx) {
                    let acc = 0;
                    let last = 0;
                    let rafId;
                    function loop(now) {
                        if (last === 0) last = now;
                        const dt = now - last;
                        last = now;
                        const s = ctx.get();
                        if (s.playing) {
                            acc += dt;
                            while (acc >= s.speed) {
                                acc -= s.speed;
                                ctx.send("tick");
                                if (s.soundOn) {
                                    try {
                                        new Audio(CLICK_SOUND)
                                            .play()
                                            .catch(() => {});
                                    } catch (_) {}
                                }
                            }
                        }
                        rafId = requestAnimationFrame(loop);
                    }
                    rafId = requestAnimationFrame(loop);
                    return () => cancelAnimationFrame(rafId);
                },
            });

            Demo.mount(document.body);
        </script>
    </body>
</html>
