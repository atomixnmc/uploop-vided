<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Particles — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 14px;
    }
    .back { position: fixed; top: 16px; left: 16px; color: #888; text-decoration: none; font-size: 14px; z-index: 100; }
    .back:hover { color: #fff; }
    .title-bar { width: min(960px, 90vw); display: flex; align-items: center; justify-content: space-between; }
    .title-bar h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    .title-bar span { font-size: 12px; color: #666; }
    canvas {
      width: min(960px, 90vw); height: 480px;
      background: #151520; border-radius: 12px; border: 1px solid #252535; display: block;
    }
    .controls {
      width: min(960px, 90vw); background: #151520; border-radius: 10px;
      padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .control-group { display: flex; flex-direction: column; gap: 3px; }
    .control-group label { font-size: 11px; color: #888; }
    .control-group .val { font-size: 11px; color: #4f8; font-family: 'Courier New', monospace; }
    .control-group input[type="range"] { accent-color: #4f8; width: 90px; }
    button {
      background: #1e1e30; color: #e0e0e0; border: 1px solid #333;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: all 0.2s; white-space: nowrap;
    }
    button:hover { background: #2a2a40; }
    button.playing { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .info-box {
      width: min(960px, 90vw); background: #0f0f1a; border: 1px solid #252535;
      border-radius: 8px; padding: 10px 18px; font-size: 12px; color: #aaa;
      display: flex; gap: 24px; flex-wrap: wrap;
    }
    .legend { display: flex; gap: 16px; }
    .legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
    .legend .swatch { width: 12px; height: 12px; border-radius: 50%; }
    .info-box span { color: #f8c040; font-family: 'Courier New', monospace; }
    .info-box code { color: #4f8; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <div id="root"></div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'
    import { blendModes } from '@uploop/compositor'

    const DEFAULT_AUDIO = 'https://www.samplelib.com/lib/preview/mp3/sample-15s.mp3'

    const MusicParticles = component('MusicParticles', {
      state: {
        playing: false, volume: 0.7, particleCount: 300,
        gravity: 0.3, drift: 0.2, fadeSpeed: 0.015,
        bassEnergy: 0, uploadLabel: 'Load Audio',
      },
      update: {
        togglePlay: (s) => ({ ...s, playing: !s.playing }),
        setPlaying: (s, p) => ({ ...s, playing: p }),
        setVolume: (s, v) => ({ ...s, volume: v }),
        setGravity: (s, v) => ({ ...s, gravity: v }),
        setDrift: (s, v) => ({ ...s, drift: v }),
        setFadeSpeed: (s, v) => ({ ...s, fadeSpeed: v }),
        setBassEnergy: (s, v) => ({ ...s, bassEnergy: v }),
        setLabel: (s, l) => ({ ...s, uploadLabel: l }),
      },
      view: (state, { send }) => html`
        <div class="title-bar">
          <h1>✨ Music Particles — Audio-Driven Particle System</h1>
          <span>Bass Burst · Color Bands · Procedural</span>
        </div>
        <canvas id="viz"></canvas>
        <div class="controls">
          <button id="playBtn" class="${state.playing ? 'playing' : ''}" onclick=${() => send('togglePlay')}>
            ${state.playing ? '⏸ Pause' : '▶ Play'}
          </button>
          <div class="control-group">
            <label>Gravity <span class="val">${state.gravity.toFixed(2)}</span></label>
            <input type="range" min="0" max="1" step="0.05" value="${state.gravity}"
              oninput=${(e) => send('setGravity', Number(e.target.value))} />
          </div>
          <div class="control-group">
            <label>Drift <span class="val">${state.drift.toFixed(2)}</span></label>
            <input type="range" min="0" max="0.8" step="0.05" value="${state.drift}"
              oninput=${(e) => send('setDrift', Number(e.target.value))} />
          </div>
          <div class="control-group">
            <label>Fade <span class="val">${state.fadeSpeed.toFixed(3)}</span></label>
            <input type="range" min="0.002" max="0.05" step="0.002" value="${state.fadeSpeed}"
              oninput=${(e) => send('setFadeSpeed', Number(e.target.value))} />
          </div>
          <label for="fileUpload" style="cursor:pointer; background:#1e1e30; color:#e0e0e0; border:1px solid #333; padding:8px 16px; border-radius:8px; font-size:13px;">
            📁 ${state.uploadLabel}
          </label>
          <input type="file" id="fileUpload" accept="audio/*" style="display:none"
            onchange=${(e) => { const f = e.target.files?.[0]; if (f) { send('setLabel', f.name); send('loadFile', f) } }} />
        </div>
        <div class="info-box">
          <div>Particles: <span id="pCount">0</span></div>
          <div>Bass Energy: <span id="bEnergy">0.00</span></div>
          <div class="legend">
            <span><span class="swatch" style="background:#ff4060"></span> Bass</span>
            <span><span class="swatch" style="background:#40ff80"></span> Mid</span>
            <span><span class="swatch" style="background:#4080ff"></span> Treble</span>
          </div>
          <div>Using <code>@uploop/timeline</code> · <code>@uploop/compositor</code></div>
        </div>
      `,
      mount(el, ctx) {
        const canvas = el.querySelector('#viz')
        const c = canvas.getContext('2d')
        let audioCtx, analyser, source, audioEl, freqData
        let particles = []
        let W, H, beatEnergy = 0, beatThreshold = 0.35
        let bassAvg = 0, midAvg = 0, trebAvg = 0

        function resize() {
          const rect = canvas.getBoundingClientRect()
          canvas.width = W = rect.width * devicePixelRatio
          canvas.height = H = rect.height * devicePixelRatio
        }

        async function loadDefaultAudio() {
          try {
            const res = await fetch(DEFAULT_AUDIO)
            loadAudio(URL.createObjectURL(await res.blob()))
            ctx.send('setLabel', 'Sample MP3')
          } catch (e) { console.warn('Default audio load failed:', e.message) }
        }

        function loadAudio(url) {
          stopAudio()
          audioCtx = new (window.AudioContext || window.webkitAudioContext)()
          analyser = audioCtx.createAnalyser()
          analyser.fftSize = 512
          analyser.smoothingTimeConstant = 0.55
          audioEl = new Audio(url)
          audioEl.crossOrigin = 'anonymous'; audioEl.loop = true; audioEl.volume = ctx.get().volume
          source = audioCtx.createMediaElementSource(audioEl)
          const gain = audioCtx.createGain(); gain.gain.value = ctx.get().volume
          source.connect(gain); gain.connect(analyser); analyser.connect(audioCtx.destination)
          freqData = new Uint8Array(analyser.frequencyBinCount)
          particles = []
          resize()
          audioEl.play(); ctx.send('setPlaying', true); loop()
        }

        function stopAudio() {
          if (loop._raf) cancelAnimationFrame(loop._raf)
          if (audioEl) { audioEl.pause(); audioEl.src = '' }
          if (source) source.disconnect()
          if (audioCtx && audioCtx.state !== 'closed') audioCtx.close()
          audioEl = null; source = null; analyser = null; audioCtx = null
        }

        function getFreqBand(start, end) {
          let sum = 0
          for (let i = start; i < end && i < freqData.length; i++) sum += freqData[i] / 255
          return sum / Math.max(end - start, 1)
        }

        function spawnBurst(x, y, color, count, speed, size) {
          for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2
            const spd = speed * (0.5 + Math.random())
            particles.push({
              x: x || W * 0.5 + (Math.random() - 0.5) * W * 0.3,
              y: y || H * 0.6 + (Math.random() - 0.5) * H * 0.2,
              vx: Math.cos(angle) * spd,
              vy: Math.sin(angle) * spd - speed * 0.5,
              color, size: size * (0.5 + Math.random()),
              alpha: 1, life: 1,
            })
          }
        }

        function update(dt) {
          const g = ctx.get().gravity, d = ctx.get().drift, fs = ctx.get().fadeSpeed
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]
            p.vy += g * dt * 60
            p.vx += (Math.random() - 0.5) * d * dt * 60
            p.y += p.vy * dt * 60
            p.x += p.vx * dt * 60
            p.life -= fs
            p.alpha = Math.max(0, p.life)
            if (p.life <= 0 || p.y > H + 50 || p.y < -50 || p.x < -50 || p.x > W + 50) {
              particles.splice(i, 1)
            }
          }

          // Spawn from audio
          if (freqData) {
            analyser.getByteFrequencyData(freqData)
            const bins = freqData.length
            bassAvg = getFreqBand(0, Math.floor(bins * 0.1))
            midAvg = getFreqBand(Math.floor(bins * 0.1), Math.floor(bins * 0.4))
            trebAvg = getFreqBand(Math.floor(bins * 0.4), bins)

            // Beat detection
            if (bassAvg > beatThreshold && bassAvg > beatEnergy * 1.3) {
              beatEnergy = bassAvg
              const cx = W * 0.2 + Math.random() * W * 0.6
              const cy = H * 0.3 + Math.random() * H * 0.4
              spawnBurst(cx, cy, '#ff4060', 15, 3 + bassAvg * 6, 4 + bassAvg * 6)
            } else {
              beatEnergy *= 0.95
            }

            // Continuous spawn based on mid
            if (midAvg > 0.15 && Math.random() < midAvg * 0.5) {
              spawnBurst(null, null, '#40ff80', 2, 1.5 + midAvg * 3, 2 + midAvg * 3)
            }
            // Treble spawn
            if (trebAvg > 0.1 && Math.random() < trebAvg * 0.3) {
              spawnBurst(null, null, '#4080ff', 1, 2 + trebAvg * 4, 1 + trebAvg * 2)
            }
          }

          // Maintain minimum particles
          const target = ctx.get().particleCount
          if (particles.length < target && Math.random() < 0.3) {
            const colors = ['#ff4060', '#40ff80', '#4080ff']
            const color = colors[Math.floor(Math.random() * 3)]
            spawnBurst(null, null, color, 1, 1, 2)
          }

          el.querySelector('#pCount').textContent = particles.length
          el.querySelector('#bEnergy').textContent = bassAvg.toFixed(3)
        }

        function render() {
          c.clearRect(0, 0, W, H)

          // Grid
          c.strokeStyle = '#1a1a28'; c.lineWidth = 0.5
          const gs = 50
          for (let x = gs; x < W; x += gs) {
            c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke()
          }
          for (let y = gs; y < H; y += gs) {
            c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke()
          }

          for (const p of particles) {
            const alpha = p.alpha
            // Glow
            const glow = c.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2)
            glow.addColorStop(0, p.color.replace(')', `,${(alpha * 0.5).toFixed(2)})`).replace('rgb', 'rgba'))
            glow.addColorStop(1, 'rgba(0,0,0,0)')
            c.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `,${alpha.toFixed(2)})`)
            const glowR = p.size * 2
            c.fillStyle = glow
            c.beginPath(); c.arc(p.x, p.y, glowR, 0, Math.PI * 2); c.fill()

            // Core
            c.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `,${alpha.toFixed(2)})`)
            c.beginPath(); c.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2); c.fill()
          }
        }

        let lastTime = 0
        function loop(now = 0) {
          if (!lastTime) lastTime = now
          const dt = Math.min((now - lastTime) / 1000, 0.05)
          lastTime = now
          update(dt)
          render()
          loop._raf = requestAnimationFrame(loop)
        }

        const origSend = ctx.send
        ctx.send = function(action, payload) {
          if (action === 'loadFile' && payload) { loadAudio(URL.createObjectURL(payload)) }
          if (action === 'setVolume') { if (audioEl) audioEl.volume = payload }
          if (action === 'togglePlay') {
            if (audioEl) { audioEl.paused ? audioEl.play() : audioEl.pause(); origSend('setPlaying', !audioEl.paused) }
            else loadDefaultAudio()
          }
          origSend(action, payload)
        }

        loadDefaultAudio()
        window.addEventListener('resize', resize)
        return () => { stopAudio(); window.removeEventListener('resize', resize) }
      }
    })

    MusicParticles.mount(document.getElementById('root'))
  </script>
</body>
</html>
