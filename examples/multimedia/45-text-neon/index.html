<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Glow Text — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 16px;
    }
    .back {
      position: fixed; top: 16px; left: 16px;
      color: #888; text-decoration: none; font-size: 14px; z-index: 100;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    canvas {
      width: min(800px, 90vw); height: 280px;
      border-radius: 12px; border: 1px solid #1a1a2e;
    }
    .controls {
      width: min(800px, 90vw); display: flex; flex-wrap: wrap;
      gap: 10px; align-items: center; justify-content: center;
    }
    .controls input, .controls select {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .controls input[type="range"] { accent-color: #4f8; width: 100px; }
    .controls button {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .controls button.active { background: #4f8; color: #0a0a0f; border-color: #4f8; }
    .controls label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
    .info { font-size: 12px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <h1>45 · Neon Glow Text</h1>
  <canvas id="canvas" width="800" height="280"></canvas>
  <div class="controls" id="controls"></div>
  <div class="info">Canvas layered blur glow · @uploop/timeline easing</div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'

    const PRESETS = ['NEON', 'UPLOOP', 'VIDED', 'GLOW', 'ELECTRIC', 'CYBER']

    const FONTS = {
      cursive: "'Brush Script MT', cursive",
      block: "'Impact', 'Arial Black', sans-serif",
      thin: "'Helvetica Neue', 'Segoe UI', sans-serif",
      mono: "'Courier New', monospace",
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16)
      const g = parseInt(hex.slice(3, 5), 16)
      const b = parseInt(hex.slice(5, 7), 16)
      return [r, g, b]
    }

    function drawBrickBg(ctx, w, h) {
      ctx.fillStyle = '#0a0a0d'
      ctx.fillRect(0, 0, w, h)
      const brickW = 60; const brickH = 24
      ctx.strokeStyle = 'rgba(255,255,255,0.04)'
      ctx.lineWidth = 0.5
      for (let y = 0; y < h; y += brickH) {
        const offset = (Math.floor(y / brickH) % 2) * (brickW / 2)
        for (let x = -brickW; x < w + brickW; x += brickW) {
          ctx.strokeRect(x + offset, y, brickW, brickH)
        }
      }
    }

    function draw(canvas, state, time) {
      const ctx = canvas.getContext('2d')
      const W = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1)
      const H = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1)
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1)
      const cw = canvas.clientWidth; const ch = canvas.clientHeight

      drawBrickBg(ctx, cw, ch)

      const [r, g, b] = hexToRgb(state.glowColor)
      const flicker = state.flicker ? 0.7 + Math.sin(time * 13) * 0.15 + Math.sin(time * 7.3) * 0.1 + Math.sin(time * 19.7) * 0.05 : 1
      const alpha = Math.min(1, flicker)
      const intensity = state.intensity * alpha
      const spread = state.spread

      const fontSize = 72
      const font = `bold ${fontSize}px ${FONTS[state.font] || FONTS.block}`
      ctx.font = font
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      const cx = cw / 2; const cy = ch / 2

      // Outer glow layers
      for (let i = 4; i >= 0; i--) {
        const blurRadius = spread * (i + 1) * 6
        const layerAlpha = intensity * (0.15 + i * 0.08)
        ctx.save()
        ctx.filter = `blur(${blurRadius}px)`
        ctx.shadowColor = `rgba(${r},${g},${b},${layerAlpha})`
        ctx.shadowBlur = blurRadius * 2
        ctx.fillStyle = `rgba(${r},${g},${b},${layerAlpha * 0.6})`
        ctx.fillText(state.text, cx, cy)
        // Extra shadow blurs
        ctx.shadowBlur = blurRadius * 4
        ctx.fillText(state.text, cx, cy)
        ctx.restore()
      }

      // Core white text
      ctx.filter = 'none'
      ctx.shadowColor = `rgba(${r},${g},${b},${intensity})`
      ctx.shadowBlur = spread * 8
      ctx.fillStyle = '#fff'
      ctx.fillText(state.text, cx, cy)
      ctx.shadowBlur = spread * 16
      ctx.fillText(state.text, cx, cy)
    }

    const Demo = component('NeonText', {
      state: {
        text: 'NEON',
        glowColor: '#ff4f88',
        flicker: true,
        intensity: 0.8,
        spread: 1,
        font: 'block',
        presetIdx: 0,
        playing: true,
      },
      update: {
        setText: (s, t) => ({ ...s, text: t }),
        setGlowColor: (s, c) => ({ ...s, glowColor: c }),
        toggleFlicker: (s) => ({ ...s, flicker: !s.flicker }),
        setIntensity: (s, v) => ({ ...s, intensity: parseFloat(v) }),
        setSpread: (s, v) => ({ ...s, spread: parseFloat(v) }),
        setFont: (s, f) => ({ ...s, font: f }),
        nextPreset: (s) => {
          const n = (s.presetIdx + 1) % PRESETS.length
          return { ...s, presetIdx: n, text: PRESETS[n] }
        },
        togglePlay: (s) => ({ ...s, playing: !s.playing }),
      },
      view: (state, { send }) => html`
        <a href="../.." class="back">← Examples</a>
        <h1>45 · Neon Glow Text</h1>
        <canvas id="canvas" width="800" height="280"></canvas>
        <div class="controls">
          <input type="text" value="${state.text}" @input=${(e) => send('setText', e.target.value)} placeholder="NEON" style="width:160px;" />
          <label>Color <input type="color" value="${state.glowColor}" @input=${(e) => send('setGlowColor', e.target.value)} style="width:32px;height:24px;padding:0;border:none;" /></label>
          <select @change=${(e) => send('setFont', e.target.value)}>
            ${Object.keys(FONTS).map(f => html`<option value="${f}" selected=${state.font === f}>${f}</option>`)}
          </select>
          <button @click=${() => send('nextPreset')}>↻ Preset</button>
          <button @click=${() => send('toggleFlicker')} class=${state.flicker ? 'active' : ''}>
            ${state.flicker ? '✨ Flicker' : '💡 Steady'}
          </button>
          <label>Glow <input type="range" min="0.1" max="2" step="0.1" value="${state.spread}" @input=${(e) => send('setSpread', e.target.value)} /></label>
          <label>Intensity <input type="range" min="0.1" max="1" step="0.05" value="${state.intensity}" @input=${(e) => send('setIntensity', e.target.value)} /></label>
          <button @click=${() => send('togglePlay')} class=${state.playing ? 'active' : ''}>
            ${state.playing ? '⏸' : '▶'}
          </button>
        </div>
        <div class="info">Canvas layered blur glow · @uploop/timeline easing</div>
      `,
      mount(el, ctx) {
        const canvas = el.querySelector('#canvas')
        let start = null, elapsed = 0, raf
        function loop(now) {
          const s = ctx.get()
          if (!start) start = now
          if (s.playing) elapsed += Math.min((now - (loop._last || now)) / 1000, 0.1)
          loop._last = now
          draw(canvas, s, elapsed)
          raf = requestAnimationFrame(loop)
        }
        raf = requestAnimationFrame(loop)
        window.addEventListener('resize', () => draw(canvas, ctx.get(), elapsed))
        return () => { cancelAnimationFrame(raf) }
      },
    })

    Demo.mount(document.body)
  </script>
</body>
</html>
