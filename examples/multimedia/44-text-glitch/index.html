<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitch Text Effects — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 16px;
    }
    .back {
      position: fixed; top: 16px; left: 16px;
      color: #888; text-decoration: none; font-size: 14px; z-index: 100;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    canvas {
      width: min(800px, 90vw); height: 260px;
      border-radius: 12px; border: 1px solid #1a1a2e;
    }
    .controls {
      width: min(800px, 90vw); display: flex; flex-wrap: wrap;
      gap: 10px; align-items: center; justify-content: center;
    }
    .controls input, .controls select {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .controls input[type="text"] { width: 200px; }
    .controls input[type="range"] { accent-color: #4f8; width: 90px; }
    .controls button {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .controls button.active { background: #4f8; color: #0a0a0f; border-color: #4f8; }
    .controls label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
    .info { font-size: 12px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <h1>44 · Glitch Text Effects</h1>
  <canvas id="canvas" width="800" height="260"></canvas>
  <div class="controls" id="controls"></div>
  <div class="info">Canvas glitch/distortion · @uploop/timeline easing</div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'

    // Simple seeded random
    function seededRandom(seed) {
      let s = seed
      return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646 }
    }

    function drawScanlines(ctx, w, h) {
      ctx.fillStyle = 'rgba(0,0,0,0.08)'
      for (let y = 0; y < h; y += 3) {
        ctx.fillRect(0, y, w, 1)
      }
    }

    function drawGrid(ctx, w, h) {
      ctx.strokeStyle = 'rgba(0,255,0,0.03)'
      ctx.lineWidth = 0.5
      for (let x = 0; x < w; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke()
      }
      for (let y = 0; y < h; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke()
      }
    }

    function draw(canvas, state, time) {
      const ctx = canvas.getContext('2d')
      const W = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1)
      const H = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1)
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1)
      const cw = canvas.clientWidth; const ch = canvas.clientHeight
      ctx.clearRect(0, 0, cw, ch)

      // Background
      ctx.fillStyle = '#08080d'
      ctx.fillRect(0, 0, cw, ch)
      drawGrid(ctx, cw, ch)
      drawScanlines(ctx, cw, ch)

      const intensity = state.intensity
      const text = state.text
      const style = state.style
      const fontSize = 56
      const rng = seededRandom(Math.floor(time * 100))

      ctx.font = `bold ${fontSize}px 'Courier New', monospace`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'

      const cx = cw / 2; const cy = ch / 2

      if (style === 'digital') {
        // RGB split
        const splitX = rng() * intensity * 12
        const splitY = rng() * intensity * 4
        ctx.fillStyle = `rgba(255,40,40,${0.8 + rng() * 0.2})`
        ctx.fillText(text, cx - splitX, cy - splitY)
        ctx.fillStyle = `rgba(40,255,40,${0.8 + rng() * 0.2})`
        ctx.fillText(text, cx, cy)
        ctx.fillStyle = `rgba(40,40,255,${0.8 + rng() * 0.2})`
        ctx.fillText(text, cx + splitX, cy + splitY)
        // Block displacement
        for (let i = 0; i < intensity * 4; i++) {
          const bx = rng() * cw
          const by = rng() * ch
          const bw = 20 + rng() * 60
          const bh = 3 + rng() * 8
          const dx = (rng() - 0.5) * intensity * 30
          ctx.drawImage(canvas, bx, by, bw, bh, bx + dx, by, bw, bh)
        }
      } else if (style === 'analog') {
        // Horizontal slice displacement
        ctx.fillStyle = '#fff'
        ctx.fillText(text, cx, cy)
        for (let i = 0; i < intensity * 6; i++) {
          const sliceY = rng() * ch
          const sliceH = 1 + rng() * 8
          const dx = (rng() - 0.5) * intensity * 40
          const sliceData = ctx.getImageData(0, sliceY, cw, sliceH)
          ctx.putImageData(sliceData, dx, sliceY)
        }
        // Noise overlay
        const noiseAlpha = intensity * 0.3
        for (let i = 0; i < cw * ch * intensity * 0.01; i++) {
          const nx = rng() * cw; const ny = rng() * ch
          ctx.fillStyle = `rgba(255,255,255,${rng() * noiseAlpha})`
          ctx.fillRect(nx, ny, 2, 1)
        }
      } else if (style === 'corrupted') {
        // Corrupted data look
        const baseText = text.split('').map(c => rng() < intensity * 0.15 ? String.fromCharCode(33 + Math.floor(rng() * 94)) : c).join('')
        ctx.fillStyle = '#fff'
        ctx.fillText(baseText, cx, cy)
        // Random blocks covering parts
        for (let i = 0; i < intensity * 3; i++) {
          const bx = cx - 200 + rng() * 400
          const by = cy - 40 + rng() * 80
          ctx.fillStyle = `rgba(10,10,15,${rng() * 0.9})`
          ctx.fillRect(bx, by, 10 + rng() * 30, 10 + rng() * 20)
        }
        // Glowing scanline
        if (rng() < intensity * 0.3) {
          const scanY = rng() * ch
          ctx.fillStyle = 'rgba(79,255,136,0.3)'
          ctx.fillRect(0, scanY, cw, 2)
        }
      }
    }

    const Demo = component('GlitchText', {
      state: { text: 'GLITCH', style: 'digital', intensity: 0.5, playing: true },
      update: {
        setText: (s, t) => ({ ...s, text: t }),
        setStyle: (s, v) => ({ ...s, style: v }),
        setIntensity: (s, v) => ({ ...s, intensity: parseFloat(v) }),
        triggerGlitch: (s) => ({ ...s, _trigger: Date.now() }),
        togglePlay: (s) => ({ ...s, playing: !s.playing }),
      },
      view: (state, { send }) => html`
        <a href="../.." class="back">← Examples</a>
        <h1>44 · Glitch Text Effects</h1>
        <canvas id="canvas" width="800" height="260"></canvas>
        <div class="controls">
          <input type="text" value="${state.text}" @input=${(e) => send('setText', e.target.value)} placeholder="GLITCH" />
          <select @change=${(e) => send('setStyle', e.target.value)}>
            <option value="digital" selected=${state.style === 'digital'}>Digital</option>
            <option value="analog" selected=${state.style === 'analog'}>Analog</option>
            <option value="corrupted" selected=${state.style === 'corrupted'}>Corrupted</option>
          </select>
          <label>Intensity <input type="range" min="0" max="1" step="0.05" value="${state.intensity}" @input=${(e) => send('setIntensity', e.target.value)} /></label>
          <button @click=${() => send('triggerGlitch')}>⚡ Glitch!</button>
          <button @click=${() => send('togglePlay')} class=${state.playing ? 'active' : ''}>
            ${state.playing ? '⏸ Pause' : '▶ Play'}
          </button>
        </div>
        <div class="info">Canvas glitch/distortion · @uploop/timeline easing</div>
      `,
      mount(el, ctx) {
        const canvas = el.querySelector('#canvas')
        let startTime = null
        let elapsed = 0
        let raf
        function loop(now) {
          const s = ctx.get()
          if (!startTime) startTime = now
          if (s.playing) elapsed += Math.min((now - (loop._last || now)) / 1000, 0.1)
          loop._last = now
          draw(canvas, { ...s, intensity: s.intensity + (s._trigger ? Math.max(0, 1 - (now - s._trigger) / 500) * 0.5 : 0) }, elapsed)
          raf = requestAnimationFrame(loop)
        }
        raf = requestAnimationFrame(loop)
        const onResize = () => draw(canvas, ctx.get(), elapsed)
        window.addEventListener('resize', onResize)
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize) }
      },
    })

    Demo.mount(document.body)
  </script>
</body>
</html>
