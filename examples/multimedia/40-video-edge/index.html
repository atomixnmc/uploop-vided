<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Video Edge Detection — uploop-vided</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                color: #e0e0e0;
                font-family: system-ui, sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 24px 40px;
                gap: 14px;
            }
            .back {
                position: fixed;
                top: 16px;
                left: 16px;
                color: #888;
                text-decoration: none;
                font-size: 14px;
                z-index: 100;
            }
            .back:hover {
                color: #fff;
            }
            .title-bar {
                width: min(1100px, 90vw);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .title-bar h1 {
                font-size: 1.25rem;
                font-weight: 600;
                color: #4f8;
            }
            .title-bar span {
                font-size: 12px;
                color: #666;
            }
            .canvas-row {
                display: flex;
                gap: 12px;
                width: min(1100px, 90vw);
                justify-content: center;
                flex-wrap: wrap;
            }
            canvas {
                background: #151520;
                border-radius: 12px;
                border: 1px solid #252535;
                display: block;
                width: 100%;
                max-width: 540px;
                height: 340px;
            }
            .controls {
                width: min(1100px, 90vw);
                background: #151520;
                border-radius: 10px;
                padding: 14px 20px;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
            }
            .control-group {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .control-group label {
                font-size: 11px;
                color: #888;
            }
            .control-group .val {
                font-size: 11px;
                color: #4f8;
                font-family: "Courier New", monospace;
            }
            .control-group input[type="range"] {
                accent-color: #4f8;
                width: 100px;
            }
            .color-picker {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .color-picker input[type="color"] {
                width: 32px;
                height: 28px;
                border: 1px solid #333;
                border-radius: 4px;
                cursor: pointer;
            }
            button {
                background: #1e1e30;
                color: #e0e0e0;
                border: 1px solid #333;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 13px;
                transition: all 0.2s;
                white-space: nowrap;
            }
            button:hover {
                background: #2a2a40;
            }
            button.playing {
                background: #2a3a2a;
                border-color: #4f8;
                color: #4f8;
            }
            button.mode-active {
                background: #2a3a2a;
                border-color: #4f8;
                color: #4f8;
            }
            .mode-btns {
                display: flex;
                gap: 4px;
            }
            .mode-btns button {
                padding: 6px 12px;
                font-size: 11px;
            }
            .info-box {
                width: min(1100px, 90vw);
                background: #0f0f1a;
                border: 1px solid #252535;
                border-radius: 8px;
                padding: 10px 18px;
                font-size: 12px;
                color: #aaa;
                display: flex;
                gap: 24px;
                flex-wrap: wrap;
            }
            .info-box span {
                color: #f8c040;
                font-family: "Courier New", monospace;
            }
            .info-box code {
                color: #4f8;
            }
            .canvas-label {
                text-align: center;
                font-size: 12px;
                color: #888;
                margin-top: 4px;
            }
        </style>
    </head>
    <body>
        <a href="../.." class="back">← Examples</a>
        <div id="root"></div>

        <script type="module">
            import { html, component } from "@uploop/html";
            import { easing } from "@uploop/timeline";
            import { blendModes } from "@uploop/compositor";

            const VideoEdge = component("VideoEdge", {
                state: {
                    playing: false,
                    algorithm: "sobel",
                    threshold: 0.15,
                    invert: false,
                    edgeColor: "#00ff88",
                    overlayOpacity: 0.6,
                    fps: 0,
                },
                update: {
                    togglePlay: (s) => ({ ...s, playing: !s.playing }),
                    setPlaying: (s, p) => ({ ...s, playing: p }),
                    setAlgo: (s, v) => ({ ...s, algorithm: v }),
                    setThreshold: (s, v) => ({ ...s, threshold: v }),
                    toggleInvert: (s) => ({ ...s, invert: !s.invert }),
                    setEdgeColor: (s, v) => ({ ...s, edgeColor: v }),
                    setOverlayOpacity: (s, v) => ({ ...s, overlayOpacity: v }),
                    setFps: (s, v) => ({ ...s, fps: v }),
                },
                view: (state, { send }) => html`
                    <div class="title-bar">
                        <h1>
                            📐 Video Edge Detection — Sobel · Laplace · Canny
                        </h1>
                        <span>Threshold · Edge Color · Overlay</span>
                    </div>
                    <div class="canvas-row">
                        <div>
                            <span class="canvas-label">Original</span
                            ><canvas id="canvasOrig"></canvas>
                        </div>
                        <div>
                            <span class="canvas-label">Edge Detection</span
                            ><canvas id="canvasEdge"></canvas>
                        </div>
                    </div>
                    <div class="controls">
                        <button
                            id="playBtn"
                            class="${state.playing ? "playing" : ""}"
                            onclick=${() => send("togglePlay")}
                        >
                            ${state.playing ? "⏸ Pause" : "▶ Play"}
                        </button>
                        <div class="mode-btns">
                            ${[
                                { k: "sobel", n: "Sobel" },
                                { k: "laplace", n: "Laplace" },
                                { k: "canny", n: "Canny" },
                            ].map(
                                (a) => html`
                                    <button
                                        class="${state.algorithm === a.k
                                            ? "mode-active"
                                            : ""}"
                                        onclick=${() => send("setAlgo", a.k)}
                                    >
                                        ${a.n}
                                    </button>
                                `,
                            )}
                        </div>
                        <div class="control-group">
                            <label
                                >Threshold
                                <span class="val"
                                    >${(state.threshold * 100).toFixed(
                                        0,
                                    )}%</span
                                ></label
                            >
                            <input
                                type="range"
                                min="0.02"
                                max="0.5"
                                step="0.01"
                                value="${state.threshold}"
                                oninput=${(e) =>
                                    send(
                                        "setThreshold",
                                        Number(e.target.value),
                                    )}
                            />
                        </div>
                        <button
                            class="${state.invert ? "mode-active" : ""}"
                            onclick=${() => send("toggleInvert")}
                        >
                            ${state.invert ? "◑ Inverted" : "◐ Normal"}
                        </button>
                        <div class="color-picker">
                            <label style="font-size:11px;color:#888;"
                                >Edge</label
                            >
                            <input
                                type="color"
                                value="${state.edgeColor}"
                                oninput=${(e) =>
                                    send("setEdgeColor", e.target.value)}
                            />
                        </div>
                        <div class="control-group">
                            <label
                                >Overlay
                                <span class="val"
                                    >${(state.overlayOpacity * 100).toFixed(
                                        0,
                                    )}%</span
                                ></label
                            >
                            <input
                                type="range"
                                min="0"
                                max="1"
                                step="0.05"
                                value="${state.overlayOpacity}"
                                oninput=${(e) =>
                                    send(
                                        "setOverlayOpacity",
                                        Number(e.target.value),
                                    )}
                            />
                        </div>
                    </div>
                    <div class="info-box">
                        <div>FPS: <span id="fpsVal">0</span></div>
                        <div>Algorithm: <span id="algoInfo">sobel</span></div>
                        <div>
                            📡 Self-generated video — no external URLs needed
                        </div>
                        <div>
                            Using <code>@uploop/timeline</code> ·
                            <code>@uploop/compositor</code>
                        </div>
                    </div>
                `,
                mount(el, ctx) {
                    const origCanvas = el.querySelector("#canvasOrig");
                    const edgeCanvas = el.querySelector("#canvasEdge");
                    const origCtx = origCanvas.getContext("2d");
                    const edgeCtx = edgeCanvas.getContext("2d");
                    let video,
                        W,
                        H,
                        fpsCounter = 0,
                        fpsTime = 0;
                    let _stopStream = null;

                    function createVideoStream() {
                        const sc = document.createElement("canvas");
                        sc.width = 640;
                        sc.height = 360;
                        const sctx = sc.getContext("2d");
                        const stream = sc.captureStream(30);
                        let t = 0,
                            animId;
                        function animate() {
                            const hue = (t * 40) % 360;
                            sctx.fillStyle = `hsl(${hue}, 30%, 10%)`;
                            sctx.fillRect(0, 0, sc.width, sc.height);
                            for (let i = 0; i < 8; i++) {
                                const x =
                                    sc.width / 2 +
                                    Math.cos(t * 2 + i * 0.8) * 200;
                                const y =
                                    sc.height / 2 +
                                    Math.sin(t * 2.5 + i * 0.8) * 120;
                                sctx.fillStyle = `hsl(${(hue + i * 40) % 360}, 70%, 60%)`;
                                sctx.beginPath();
                                sctx.arc(
                                    x,
                                    y,
                                    25 + Math.sin(t + i) * 15,
                                    0,
                                    Math.PI * 2,
                                );
                                sctx.fill();
                            }
                            sctx.fillStyle = "#ffffff40";
                            sctx.font = "bold 48px system-ui";
                            sctx.textAlign = "center";
                            sctx.fillText(
                                "Uploop Vided",
                                sc.width / 2,
                                sc.height / 2 + 16,
                            );
                            t += 0.02;
                            animId = requestAnimationFrame(animate);
                        }
                        animate();
                        return {
                            stream,
                            stop: () => cancelAnimationFrame(animId),
                        };
                    }

                    function resize() {
                        for (const can of [origCanvas, edgeCanvas]) {
                            const rect = can.getBoundingClientRect();
                            can.width = rect.width * devicePixelRatio;
                            can.height = rect.height * devicePixelRatio;
                        }
                        W = origCanvas.width;
                        H = origCanvas.height;
                    }

                    function loadVideo() {
                        const { stream, stop } = createVideoStream();
                        _stopStream = stop;
                        video = document.createElement("video");
                        video.srcObject = stream;
                        video.loop = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.addEventListener("loadedmetadata", () => {
                            resize();
                            video.play();
                            ctx.send("setPlaying", true);
                            loop();
                        });
                    }

                    function rgbToGray(data, i) {
                        return (
                            0.299 * data[i] +
                            0.587 * data[i + 1] +
                            0.114 * data[i + 2]
                        );
                    }

                    function sobelEdge(imgData) {
                        const W = imgData.width,
                            H = imgData.height;
                        const src = imgData.data;
                        const out = new Uint8ClampedArray(src.length);

                        const Gx = [
                            [-1, 0, 1],
                            [-2, 0, 2],
                            [-1, 0, 1],
                        ];
                        const Gy = [
                            [-1, -2, -1],
                            [0, 0, 0],
                            [1, 2, 1],
                        ];

                        for (let y = 1; y < H - 1; y++) {
                            for (let x = 1; x < W - 1; x++) {
                                let gx = 0,
                                    gy = 0;
                                for (let ky = -1; ky <= 1; ky++) {
                                    for (let kx = -1; kx <= 1; kx++) {
                                        const idx =
                                            ((y + ky) * W + (x + kx)) * 4;
                                        const gray = rgbToGray(src, idx);
                                        gx += gray * Gx[ky + 1][kx + 1];
                                        gy += gray * Gy[ky + 1][kx + 1];
                                    }
                                }
                                const mag = Math.sqrt(gx * gx + gy * gy) / 255;
                                const idx = (y * W + x) * 4;
                                const v = Math.min(255, mag * 255);
                                out[idx] = v;
                                out[idx + 1] = v;
                                out[idx + 2] = v;
                                out[idx + 3] = 255;
                            }
                        }
                        return new ImageData(out, W, H);
                    }

                    function laplaceEdge(imgData) {
                        const W = imgData.width,
                            H = imgData.height;
                        const src = imgData.data;
                        const out = new Uint8ClampedArray(src.length);
                        const kernel = [
                            [0, -1, 0],
                            [-1, 4, -1],
                            [0, -1, 0],
                        ];

                        for (let y = 1; y < H - 1; y++) {
                            for (let x = 1; x < W - 1; x++) {
                                let sum = 0;
                                for (let ky = -1; ky <= 1; ky++) {
                                    for (let kx = -1; kx <= 1; kx++) {
                                        const idx =
                                            ((y + ky) * W + (x + kx)) * 4;
                                        sum +=
                                            rgbToGray(src, idx) *
                                            kernel[ky + 1][kx + 1];
                                    }
                                }
                                const idx = (y * W + x) * 4;
                                const v = Math.min(255, Math.abs(sum));
                                out[idx] = v;
                                out[idx + 1] = v;
                                out[idx + 2] = v;
                                out[idx + 3] = 255;
                            }
                        }
                        return new ImageData(out, W, H);
                    }

                    function cannyEdge(imgData, threshold) {
                        const W = imgData.width,
                            H = imgData.height;
                        const src = imgData.data;
                        const grad = new Float32Array(W * H);
                        const dir = new Float32Array(W * H);
                        const out = new Uint8ClampedArray(src.length);

                        // Step 1: Compute gradients
                        for (let y = 1; y < H - 1; y++) {
                            for (let x = 1; x < W - 1; x++) {
                                const tl = rgbToGray(
                                    src,
                                    ((y - 1) * W + (x - 1)) * 4,
                                );
                                const t = rgbToGray(src, ((y - 1) * W + x) * 4);
                                const tr = rgbToGray(
                                    src,
                                    ((y - 1) * W + (x + 1)) * 4,
                                );
                                const l = rgbToGray(src, (y * W + (x - 1)) * 4);
                                const r = rgbToGray(src, (y * W + (x + 1)) * 4);
                                const bl = rgbToGray(
                                    src,
                                    ((y + 1) * W + (x - 1)) * 4,
                                );
                                const b = rgbToGray(src, ((y + 1) * W + x) * 4);
                                const br = rgbToGray(
                                    src,
                                    ((y + 1) * W + (x + 1)) * 4,
                                );

                                const gx = -tl + tr - 2 * l + 2 * r - bl + br;
                                const gy = -tl - 2 * t - tr + bl + 2 * b + br;
                                const idx = y * W + x;
                                grad[idx] = Math.sqrt(gx * gx + gy * gy) / 255;
                                dir[idx] = Math.atan2(gy, gx);
                            }
                        }

                        // Step 2: Non-maximum suppression
                        const suppressed = new Float32Array(W * H);
                        for (let y = 1; y < H - 1; y++) {
                            for (let x = 1; x < W - 1; x++) {
                                const idx = y * W + x;
                                const angle = dir[idx];
                                let n1, n2;

                                if (
                                    (angle >= -Math.PI / 8 &&
                                        angle < Math.PI / 8) ||
                                    angle >= (7 * Math.PI) / 8 ||
                                    angle < (-7 * Math.PI) / 8
                                ) {
                                    n1 = grad[y * W + (x + 1)];
                                    n2 = grad[y * W + (x - 1)];
                                } else if (
                                    (angle >= Math.PI / 8 &&
                                        angle < (3 * Math.PI) / 8) ||
                                    (angle >= (-7 * Math.PI) / 8 &&
                                        angle < (-5 * Math.PI) / 8)
                                ) {
                                    n1 = grad[(y - 1) * W + (x + 1)];
                                    n2 = grad[(y + 1) * W + (x - 1)];
                                } else if (
                                    (angle >= (3 * Math.PI) / 8 &&
                                        angle < (5 * Math.PI) / 8) ||
                                    (angle >= (-5 * Math.PI) / 8 &&
                                        angle < (-3 * Math.PI) / 8)
                                ) {
                                    n1 = grad[(y - 1) * W + x];
                                    n2 = grad[(y + 1) * W + x];
                                } else {
                                    n1 = grad[(y - 1) * W + (x - 1)];
                                    n2 = grad[(y + 1) * W + (x + 1)];
                                }

                                suppressed[idx] =
                                    grad[idx] >= n1 && grad[idx] >= n2
                                        ? grad[idx]
                                        : 0;
                            }
                        }

                        // Step 3: Apply threshold
                        for (let i = 0; i < out.length; i += 4) {
                            const idx = i / 4;
                            const v = suppressed[idx] > threshold ? 255 : 0;
                            out[i] = v;
                            out[i + 1] = v;
                            out[i + 2] = v;
                            out[i + 3] = 255;
                        }

                        return new ImageData(out, W, H);
                    }

                    function render() {
                        if (!video || video.readyState < 2) return;

                        // Draw original video to both canvases at reduced size for performance
                        const perfW = W,
                            perfH = H;

                        // Original
                        origCtx.clearRect(0, 0, W, H);
                        origCtx.drawImage(video, 0, 0, perfW, perfH);

                        // Get frame data
                        const offCanvas = document.createElement("canvas");
                        offCanvas.width = perfW;
                        offCanvas.height = perfH;
                        const offCtx = offCanvas.getContext("2d");
                        offCtx.drawImage(video, 0, 0, perfW, perfH);
                        const frameData = offCtx.getImageData(
                            0,
                            0,
                            perfW,
                            perfH,
                        );

                        // Run edge detection
                        const s = ctx.get();
                        let edgeData;
                        if (s.algorithm === "sobel")
                            edgeData = sobelEdge(frameData);
                        else if (s.algorithm === "laplace")
                            edgeData = laplaceEdge(frameData);
                        else edgeData = cannyEdge(frameData, s.threshold);

                        // Apply threshold filtering for sobel/laplace
                        if (s.algorithm !== "canny") {
                            const d = edgeData.data;
                            for (let i = 0; i < d.length; i += 4) {
                                const v = d[i] / 255 > s.threshold ? 255 : 0;
                                d[i] = v;
                                d[i + 1] = v;
                                d[i + 2] = v;
                            }
                        }

                        // Colorize edges
                        const [er, eg, eb] = [
                            parseInt(s.edgeColor.slice(1, 3), 16),
                            parseInt(s.edgeColor.slice(3, 5), 16),
                            parseInt(s.edgeColor.slice(5, 7), 16),
                        ];
                        const ed = edgeData.data;
                        for (let i = 0; i < ed.length; i += 4) {
                            if (ed[i] > 0) {
                                ed[i] = s.invert ? 255 - er : er;
                                ed[i + 1] = s.invert ? 255 - eg : eg;
                                ed[i + 2] = s.invert ? 255 - eb : eb;
                            } else if (s.invert) {
                                ed[i] = 255;
                                ed[i + 1] = 255;
                                ed[i + 2] = 255;
                            }
                        }

                        // Draw edges
                        edgeCtx.clearRect(0, 0, W, H);

                        // Draw original faded + edges overlay
                        edgeCtx.globalAlpha = 1 - s.overlayOpacity;
                        edgeCtx.drawImage(video, 0, 0, perfW, perfH);
                        edgeCtx.globalAlpha = s.overlayOpacity;
                        edgeCtx.putImageData(edgeData, 0, 0);
                        edgeCtx.globalAlpha = 1;

                        el.querySelector("#algoInfo").textContent = s.algorithm;

                        fpsCounter++;
                        const now = performance.now();
                        if (now - fpsTime >= 1000) {
                            el.querySelector("#fpsVal").textContent =
                                Math.round(
                                    fpsCounter / ((now - fpsTime) / 1000),
                                );
                            fpsCounter = 0;
                            fpsTime = now;
                        }
                    }

                    function loop() {
                        render();
                        loop._raf = requestAnimationFrame(loop);
                    }

                    const origSend = ctx.send;
                    ctx.send = function (action, payload) {
                        if (action === "togglePlay") {
                            if (video) {
                                video.paused ? video.play() : video.pause();
                                origSend("setPlaying", !video.paused);
                            }
                        }
                        origSend(action, payload);
                    };

                    resize();
                    loadVideo();
                    window.addEventListener("resize", resize);
                    return () => {
                        if (loop._raf) cancelAnimationFrame(loop._raf);
                        if (_stopStream) _stopStream();
                        if (video) {
                            video.pause();
                            video.srcObject = null;
                        }
                        window.removeEventListener("resize", resize);
                    };
                },
            });

            VideoEdge.mount(document.getElementById("root"));
        </script>
    </body>
</html>
