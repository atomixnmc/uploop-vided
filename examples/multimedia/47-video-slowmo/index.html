<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Slow Motion / Speed Ramp — uploop-vided</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                color: #e0e0e0;
                font-family: system-ui, sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 24px 40px;
                gap: 16px;
            }
            .back {
                position: fixed;
                top: 16px;
                left: 16px;
                color: #888;
                text-decoration: none;
                font-size: 14px;
                z-index: 100;
            }
            .back:hover {
                color: #fff;
            }
            h1 {
                font-size: 1.25rem;
                font-weight: 600;
                color: #4f8;
            }
            .stage {
                width: min(800px, 90vw);
                border-radius: 12px;
                overflow: hidden;
                background: #000;
                border: 1px solid #1a1a2e;
            }
            video {
                display: block;
                width: 100%;
                border-radius: 12px;
            }
            .controls {
                width: min(800px, 90vw);
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
                justify-content: center;
            }
            .controls button {
                background: #151520;
                color: #e0e0e0;
                border: 1px solid #2a2a40;
                padding: 6px 14px;
                border-radius: 6px;
                font-size: 13px;
                cursor: pointer;
                font-family: inherit;
            }
            .controls button.active {
                background: #4f8;
                color: #0a0a0f;
                border-color: #4f8;
            }
            .controls button.speed-preset {
                min-width: 50px;
            }
            .controls input[type="range"] {
                accent-color: #4f8;
                width: 120px;
            }
            .controls label {
                font-size: 12px;
                color: #888;
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .speed-display {
                font-size: 2rem;
                font-weight: 700;
                font-family: monospace;
                color: #4f8;
                text-align: center;
                min-width: 80px;
            }
            .info {
                font-size: 12px;
                color: #555;
                margin-top: 4px;
            }
        </style>
    </head>
    <body>
        <a href="../.." class="back">← Examples</a>
        <h1>47 · Slow Motion / Speed Ramp</h1>
        <div class="stage">
            <video data-ref="video" muted loop playsinline></video>
        </div>
        <div class="speed-display" id="speed-label">1.00×</div>
        <div class="controls" id="controls"></div>
        <div class="info">
            📡 Self-generated video — no external URLs needed · playbackRate
            speed control · @uploop/timeline easing
        </div>

        <script type="module">
            import { html, component } from "@uploop/html";
            import { easing } from "@uploop/timeline";

            const SPEED_PRESETS = [0.1, 0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];

            function createVideoStream() {
                const sc = document.createElement("canvas");
                sc.width = 640;
                sc.height = 360;
                const sctx = sc.getContext("2d");
                const stream = sc.captureStream(30);
                let t = 0,
                    animId;
                function animate() {
                    const hue = (t * 40) % 360;
                    sctx.fillStyle = `hsl(${hue}, 30%, 10%)`;
                    sctx.fillRect(0, 0, sc.width, sc.height);
                    for (let i = 0; i < 8; i++) {
                        const x =
                            sc.width / 2 + Math.cos(t * 2 + i * 0.8) * 200;
                        const y =
                            sc.height / 2 + Math.sin(t * 2.5 + i * 0.8) * 120;
                        sctx.fillStyle = `hsl(${(hue + i * 40) % 360}, 70%, 60%)`;
                        sctx.beginPath();
                        sctx.arc(
                            x,
                            y,
                            25 + Math.sin(t + i) * 15,
                            0,
                            Math.PI * 2,
                        );
                        sctx.fill();
                    }
                    sctx.fillStyle = "#ffffff40";
                    sctx.font = "bold 48px system-ui";
                    sctx.textAlign = "center";
                    sctx.fillText(
                        "Uploop Vided",
                        sc.width / 2,
                        sc.height / 2 + 16,
                    );
                    t += 0.02;
                    animId = requestAnimationFrame(animate);
                }
                animate();
                return { stream, stop: () => cancelAnimationFrame(animId) };
            }

            const Demo = component("SlowMo", {
                state: { playing: false, speed: 1 },
                update: {
                    togglePlay: (s) => ({ ...s, playing: !s.playing }),
                    setSpeed: (s, v) => ({ ...s, speed: parseFloat(v) }),
                },
                view: (state, { send }) => html`
                    <a href="../.." class="back">← Examples</a>
                    <h1>47 · Slow Motion / Speed Ramp</h1>
                    <div class="stage">
                        <video data-ref="video" muted loop playsinline></video>
                    </div>
                    <div class="speed-display">${state.speed.toFixed(2)}×</div>
                    <div class="controls">
                        <button
                            @click=${() => send("togglePlay")}
                            class=${state.playing ? "active" : ""}
                        >
                            ${state.playing ? "⏸ Pause" : "▶ Play"}
                        </button>
                        <label
                            >Speed
                            <input
                                type="range"
                                min="0.1"
                                max="4"
                                step="0.05"
                                value="${state.speed}"
                                @input=${(e) =>
                                    send("setSpeed", e.target.value)}
                        /></label>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;">
                            ${SPEED_PRESETS.map(
                                (sp) => html`
                                    <button
                                        class="speed-preset ${Math.abs(
                                            state.speed - sp,
                                        ) < 0.01
                                            ? "active"
                                            : ""}"
                                        @click=${() => send("setSpeed", sp)}
                                    >
                                        ${sp}×
                                    </button>
                                `,
                            )}
                        </div>
                    </div>
                    <div class="info">
                        📡 Self-generated video — no external URLs needed ·
                        playbackRate speed control · @uploop/timeline easing
                    </div>
                `,
                mount(el, ctx) {
                    const video = el.querySelector('video');
                    const { stream, stop: stopStream } = createVideoStream();
                    video.srcObject = stream;
                    video.play().then(() => ctx.send("togglePlay"));

                    let raf,
                        last = 0;
                    function loop(now) {
                        const s = ctx.get();
                        if (s.playing) {
                            if (video.paused) video.play().catch(() => {});
                            video.playbackRate = s.speed;
                        } else {
                            if (!video.paused) video.pause();
                        }
                        raf = requestAnimationFrame(loop);
                    }
                    raf = requestAnimationFrame(loop);

                    const onKey = (e) => {
                        if (e.key === " ") {
                            e.preventDefault();
                            ctx.send("togglePlay");
                        }
                    };
                    window.addEventListener("keydown", onKey);
                    return () => {
                        cancelAnimationFrame(raf);
                        stopStream();
                        video.pause();
                        video.srcObject = null;
                        window.removeEventListener("keydown", onKey);
                    };
                },
            });

            Demo.mount(document.body);
        </script>
    </body>
</html>
