<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fire / Particle Compositing — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 16px;
    }
    .back {
      position: fixed; top: 16px; left: 16px;
      color: #888; text-decoration: none; font-size: 14px; z-index: 100;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    .stage {
      width: min(800px, 90vw); position: relative; border-radius: 12px;
      overflow: hidden; border: 1px solid #1a1a2e; background: #000;
    }
    canvas { display: block; width: 100%; border-radius: 12px; }
    video { display: block; width: 100%; border-radius: 12px; position: absolute; top: 0; left: 0; }
    .controls {
      width: min(800px, 90vw); display: flex; flex-wrap: wrap;
      gap: 10px; align-items: center; justify-content: center;
    }
    .controls input, .controls select {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .controls input[type="range"] { accent-color: #4f8; width: 90px; }
    .controls button {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .controls button.active { background: #4f8; color: #0a0a0f; border-color: #4f8; }
    .controls label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }
    .info { font-size: 12px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <h1>49 · Fire / Particle Compositing</h1>
  <div class="stage" id="stage">
    <canvas id="canvas" width="800" height="450"></canvas>
    <video id="video" src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_2MB.mp4" muted loop playsinline style="display:none;"></video>
  </div>
  <div class="controls" id="controls"></div>
  <div class="info">Procedural fire particles · @uploop/timeline easing · @uploop/compositor blendModes</div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'
    import { blendModes } from '@uploop/compositor'

    // Simple Perlin-like noise
    function noise2D(x, y) {
      const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453
      return n - Math.floor(n)
    }

    function smoothNoise(x, y) {
      const ix = Math.floor(x); const iy = Math.floor(y)
      const fx = x - ix; const fy = y - iy
      const sx = fx * fx * (3 - 2 * fx); const sy = fy * fy * (3 - 2 * fy)
      const n00 = noise2D(ix, iy); const n10 = noise2D(ix + 1, iy)
      const n01 = noise2D(ix, iy + 1); const n11 = noise2D(ix + 1, iy + 1)
      const nx0 = n00 + (n10 - n00) * sx; const nx1 = n01 + (n11 - n01) * sx
      return nx0 + (nx1 - nx0) * sy
    }

    function fbm(x, y, octaves = 4) {
      let v = 0, amp = 0.5, freq = 1
      for (let i = 0; i < octaves; i++) {
        v += amp * smoothNoise(x * freq, y * freq)
        amp *= 0.5; freq *= 2
      }
      return v
    }

    const PALETTES = {
      fire: [
        { pos: 0, r: 0, g: 0, b: 0 },
        { pos: 0.3, r: 80, g: 0, b: 0 },
        { pos: 0.55, r: 200, g: 40, b: 0 },
        { pos: 0.75, r: 255, g: 140, b: 0 },
        { pos: 0.9, r: 255, g: 220, b: 80 },
        { pos: 1, r: 255, g: 255, b: 200 },
      ],
      blue: [
        { pos: 0, r: 0, g: 0, b: 0 },
        { pos: 0.3, r: 0, g: 0, b: 60 },
        { pos: 0.55, r: 0, g: 40, b: 180 },
        { pos: 0.75, r: 0, g: 120, b: 255 },
        { pos: 0.9, r: 100, g: 200, b: 255 },
        { pos: 1, r: 200, g: 240, b: 255 },
      ],
      green: [
        { pos: 0, r: 0, g: 0, b: 0 },
        { pos: 0.3, r: 0, g: 40, b: 0 },
        { pos: 0.55, r: 0, g: 140, b: 20 },
        { pos: 0.75, r: 40, g: 220, b: 40 },
        { pos: 0.9, r: 150, g: 255, b: 80 },
        { pos: 1, r: 220, g: 255, b: 180 },
      ],
    }

    function colorFromPalette(palette, t) {
      const p = palette
      for (let i = 0; i < p.length - 1; i++) {
        if (t <= p[i + 1].pos) {
          const seg = (t - p[i].pos) / (p[i + 1].pos - p[i].pos)
          return {
            r: Math.round(p[i].r + (p[i + 1].r - p[i].r) * seg),
            g: Math.round(p[i].g + (p[i + 1].g - p[i].g) * seg),
            b: Math.round(p[i].b + (p[i + 1].b - p[i].b) * seg),
          }
        }
      }
      const last = p[p.length - 1]
      return { r: last.r, g: last.g, b: last.b }
    }

    // Particle system
    class Spark {
      constructor(w, h, wind) {
        this.reset(w, h, wind)
      }
      reset(w, h, wind) {
        this.x = w * 0.3 + Math.random() * w * 0.4
        this.y = h * 0.6 + Math.random() * h * 0.4
        this.vx = (Math.random() - 0.5) * 0.5
        this.vy = -(1 + Math.random() * 3)
        this.life = 0.5 + Math.random() * 1.5
        this.age = 0
        this.size = 1 + Math.random() * 2
      }
      update(dt, wind) {
        this.age += dt
        this.x += (this.vx + wind * 0.5) * dt * 60
        this.y += this.vy * dt * 60
        this.vx += (Math.random() - 0.5) * 0.1 * dt * 60
        return this.age >= this.life
      }
    }

    const Demo = component('FireEffect', {
      state: {
        intensity: 1, flameWidth: 1, flameHeight: 1,
        palette: 'fire', wind: 0, particleCount: 80, particleSize: 1,
        showVideo: false, playing: true,
      },
      update: {
        setIntensity: (s, v) => ({ ...s, intensity: parseFloat(v) }),
        setFlameWidth: (s, v) => ({ ...s, flameWidth: parseFloat(v) }),
        setFlameHeight: (s, v) => ({ ...s, flameHeight: parseFloat(v) }),
        setPalette: (s, v) => ({ ...s, palette: v }),
        setWind: (s, v) => ({ ...s, wind: parseFloat(v) }),
        setParticleCount: (s, v) => ({ ...s, particleCount: parseInt(v) }),
        setParticleSize: (s, v) => ({ ...s, particleSize: parseFloat(v) }),
        toggleVideo: (s) => ({ ...s, showVideo: !s.showVideo }),
        togglePlay: (s) => ({ ...s, playing: !s.playing }),
      },
      view: (state, { send }) => html`
        <a href="../.." class="back">← Examples</a>
        <h1>49 · Fire / Particle Compositing</h1>
        <div class="stage">
          <canvas id="canvas" width="800" height="450"></canvas>
          <video id="video"
            src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_2MB.mp4"
            muted loop playsinline
            style="display:${state.showVideo ? 'block' : 'none'};opacity:0.5;mix-blend-mode:screen;"
          ></video>
        </div>
        <div class="controls">
          <select @change=${(e) => send('setPalette', e.target.value)}>
            ${Object.keys(PALETTES).map(p => html`<option value="${p}" selected=${state.palette === p}>${p}</option>`)}
          </select>
          <label>Intensity <input type="range" min="0.1" max="2" step="0.05" value="${state.intensity}" @input=${(e) => send('setIntensity', e.target.value)} /></label>
          <label>Width <input type="range" min="0.3" max="2" step="0.1" value="${state.flameWidth}" @input=${(e) => send('setFlameWidth', e.target.value)} /></label>
          <label>Height <input type="range" min="0.3" max="2" step="0.1" value="${state.flameHeight}" @input=${(e) => send('setFlameHeight', e.target.value)} /></label>
          <label>Wind <input type="range" min="-2" max="2" step="0.1" value="${state.wind}" @input=${(e) => send('setWind', e.target.value)} /></label>
          <label>Particles <input type="range" min="10" max="200" step="10" value="${state.particleCount}" @input=${(e) => send('setParticleCount', e.target.value)} /></label>
          <button @click=${() => send('toggleVideo')} class=${state.showVideo ? 'active' : ''}>
            ${state.showVideo ? '📺 Video On' : '📺 Video'}
          </button>
          <button @click=${() => send('togglePlay')} class=${state.playing ? 'active' : ''}>
            ${state.playing ? '⏸' : '▶'}
          </button>
        </div>
        <div class="info">Procedural fire particles · @uploop/timeline easing · @uploop/compositor blendModes</div>
      `,
      mount(el, ctx) {
        const canvas = el.querySelector('#canvas')
        const video = el.querySelector('#video')
        let sparks = []
        let t = 0; let raf; let last = 0

        function loop(now) {
          const s = ctx.get()
          const W = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1)
          const H = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1)
          const ctx2d = canvas.getContext('2d')
          ctx2d.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1)
          const cw = canvas.clientWidth; const ch = canvas.clientHeight

          if (last === 0) last = now
          const dt = Math.min((now - last) / 1000, 0.1); last = now
          if (s.playing) t += dt

          // Draw background
          ctx2d.clearRect(0, 0, cw, ch)
          ctx2d.fillStyle = '#050508'
          ctx2d.fillRect(0, 0, cw, ch)

          // Sync video playback
          if (s.showVideo) {
            if (video.style.display === 'none') { video.style.display = 'block'; video.play().catch(() => {}) }
            else if (video.paused) video.play().catch(() => {})
          } else {
            if (video.style.display !== 'none') { video.style.display = 'none'; video.pause() }
          }

          const palette = PALETTES[s.palette] || PALETTES.fire
          const imgData = ctx2d.createImageData(cw, ch)
          const data = imgData.data
          const fw = s.flameWidth; const fh = s.flameHeight
          const wind = s.wind

          // Generate fire via noise
          for (let py = 0; py < ch; py++) {
            for (let px = 0; px < cw; px++) {
              const nx = (px / cw - 0.5) / fw + 0.5
              const ny = 1 - py / ch
              const nyH = ny / fh
              const noiseVal = fbm(nx * 4 + t * 0.5 + wind * 0.3, nyH * 3 + t * 0.3, 5)
              const heightFactor = Math.max(0, 1 - nyH * 1.2)
              const edgeFactor = 1 - Math.abs(nx - 0.5) * 2 * (1 + 0.5 * noiseVal)
              const flame = noiseVal * heightFactor * Math.max(0, edgeFactor) * s.intensity
              const idx = (py * cw + px) * 4
              if (flame > 0.02) {
                const col = colorFromPalette(palette, Math.min(1, flame * 1.3))
                data[idx] = col.r; data[idx + 1] = col.g; data[idx + 2] = col.b; data[idx + 3] = Math.min(255, flame * 300)
              } else {
                data[idx + 3] = 0
              }
            }
          }
          ctx2d.putImageData(imgData, 0, 0)

          // Sparks
          while (sparks.length < s.particleCount) {
            sparks.push(new Spark(cw, ch, wind))
          }
          while (sparks.length > s.particleCount) {
            sparks.length = s.particleCount
          }

          const sparkPalette = s.palette === 'fire' ? PALETTES.fire : (s.palette === 'blue' ? PALETTES.blue : PALETTES.green)
          for (let i = sparks.length - 1; i >= 0; i--) {
            const sp = sparks[i]
            const dead = sp.update(dt, wind)
            if (dead) { sp.reset(cw, ch, wind); continue }
            const alpha = 1 - sp.age / sp.life
            const col = colorFromPalette(sparkPalette, 0.5 + alpha * 0.5)
            ctx2d.fillStyle = `rgba(${col.r},${col.g},${col.b},${alpha * 0.8})`
            ctx2d.beginPath()
            ctx2d.arc(sp.x, sp.y, sp.size * s.particleSize, 0, Math.PI * 2)
            ctx2d.fill()
          }

          raf = requestAnimationFrame(loop)
        }
        raf = requestAnimationFrame(loop)
        const onResize = () => {}
        window.addEventListener('resize', onResize)
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize) }
      },
    })

    Demo.mount(document.body)
  </script>
</body>
</html>
