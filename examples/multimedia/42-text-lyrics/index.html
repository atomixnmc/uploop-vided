<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Display — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; gap: 16px;
    }
    .back {
      position: fixed; top: 16px; left: 16px;
      color: #888; text-decoration: none; font-size: 14px; z-index: 100;
    }
    .back:hover { color: #fff; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #4f8; }
    .stage {
      width: min(700px, 90vw); min-height: 360px;
      background: #151520; border-radius: 12px; border: 1px solid #1a1a2e;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px; gap: 6px;
      overflow: hidden; position: relative;
    }
    .lyric-line {
      font-size: 1.4rem; font-weight: 500; transition: opacity 0.4s, transform 0.4s, color 0.3s;
      text-align: center; line-height: 1.8; color: #444;
      transform: translateY(0); opacity: 0.35;
    }
    .lyric-line.active {
      color: #4f8; opacity: 1; font-weight: 700; transform: translateY(0);
    }
    .lyric-line.past { color: #666; opacity: 0.5; }
    .lyric-line.upcoming { transform: translateY(8px); }
    .word-highlight { color: #fff; }
    .progress-bar {
      width: min(700px, 90vw); height: 4px; background: #1a1a2e;
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #4f8; border-radius: 2px; transition: width 0.2s;
    }
    .controls {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      background: #151520; color: #e0e0e0; border: 1px solid #2a2a40;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .controls button.active { background: #4f8; color: #0a0a0f; border-color: #4f8; }
    .info { font-size: 12px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <a href="../.." class="back">← Examples</a>
  <h1>42 · Lyrics Display with Timing</h1>
  <div class="stage" id="stage"></div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>
  <div class="controls" id="controls"></div>
  <div class="info">Timed karaoke-style lyrics · @uploop/timeline easing</div>

  <script type="module">
    import { html, component } from '@uploop/html'
    import { easing } from '@uploop/timeline'

    const LYRICS_DATA = [
      { time: 0.0, words: ['Are', 'you', 'ready', 'for', 'the', 'uploop?'] },
      { time: 2.5, words: ['We', 'build', 'multimedia', 'with', 'code'] },
      { time: 5.0, words: ['Canvas,', 'timelines,', 'easing,', 'and', 'flow'] },
      { time: 7.5, words: ['Every', 'frame', 'crafted', 'with', 'precision'] },
      { time: 10.0, words: ['Dark', 'theme,', 'bright', 'ideas'] },
      { time: 12.5, words: ['Uploop', 'vided', '—', 'video', 'editor', 'SDK'] },
      { time: 15.0, words: ['Components', 'drive', 'the', 'experience'] },
      { time: 17.5, words: ['Thank', 'you', 'for', 'watching!'] },
    ]
    const TOTAL_DURATION = 20

    const MP3_SRC = 'https://samplelib.com/lib/preview/mp3/sample-15s.mp3'

    function fmtTime(s) {
      const m = Math.floor(s / 60)
      return `${String(m).padStart(2,'0')}:${(s % 60).toFixed(1).padStart(4,'0')}`
    }

    function lyricProgress(line, time) {
      const nextLine = LYRICS_DATA[LYRICS_DATA.indexOf(line) + 1]
      if (!nextLine) return 1
      const dur = nextLine.time - line.time
      if (dur <= 0) return 1
      return Math.min(1, Math.max(0, (time - line.time) / dur))
    }

    const Demo = component('LyricsDisplay', {
      state: { playing: false, currentTime: 0, currentLineIdx: 0, wordIdx: 0 },
      update: {
        togglePlay: (s) => ({ ...s, playing: !s.playing, currentTime: s.currentTime >= TOTAL_DURATION ? 0 : s.currentTime }),
        tick: (s, dt) => {
          if (!s.playing) return s
          const t = s.currentTime + dt
          if (t >= TOTAL_DURATION) return { ...s, currentTime: TOTAL_DURATION, playing: false }
          return { ...s, currentTime: t }
        },
        seek: (s, pct) => {
          const t = Math.max(0, Math.min(TOTAL_DURATION, pct * TOTAL_DURATION))
          return { ...s, currentTime: t }
        },
        nextLine: (s) => {
          const next = s.currentLineIdx + 1
          if (next >= LYRICS_DATA.length) return { ...s, currentLineIdx: 0, wordIdx: 0 }
          return { ...s, currentLineIdx: next, wordIdx: 0 }
        },
      },
      view: (state, { send }) => {
        let activeLine = 0
        let activeWord = 0
        for (let i = LYRICS_DATA.length - 1; i >= 0; i--) {
          if (state.currentTime >= LYRICS_DATA[i].time) {
            activeLine = i
            const prog = lyricProgress(LYRICS_DATA[i], state.currentTime)
            activeWord = Math.floor(prog * LYRICS_DATA[i].words.length)
            break
          }
        }
        const pct = (state.currentTime / TOTAL_DURATION) * 100

        return html`
          <a href="../.." class="back">← Examples</a>
          <h1>42 · Lyrics Display with Timing</h1>
          <div class="stage">
            ${LYRICS_DATA.map((line, li) => html`
              <div class="lyric-line ${li === activeLine ? 'active' : li < activeLine ? 'past' : 'upcoming'}">
                ${line.words.map((w, wi) => html`
                  <span class="${li === activeLine && wi < activeWord ? 'word-highlight' : ''}">${w} </span>
                `)}
              </div>
            `)}
          </div>
          <div class="progress-bar" @click=${(e) => {
            const r = e.currentTarget.getBoundingClientRect()
            send('seek', (e.clientX - r.left) / r.width)
          }}>
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="controls">
            <button @click=${() => send('togglePlay')} class=${state.playing ? 'active' : ''}>
              ${state.playing ? '⏸ Pause' : '▶ Play'}
            </button>
            <button @click=${() => send('nextLine')}>⏭ Next Line</button>
            <span style="font-family:monospace;font-size:13px;color:#888;">
              ${fmtTime(state.currentTime)} / ${fmtTime(TOTAL_DURATION)}
            </span>
          </div>
          <div class="info">Timed karaoke-style lyrics · @uploop/timeline easing</div>
        `
      },
      mount(el, ctx) {
        let lastTime = 0; let rafId
        function loop(now) {
          if (lastTime === 0) lastTime = now
          const dt = Math.min((now - lastTime) / 1000, 0.2)
          lastTime = now
          const s = ctx.get()
          if (s.playing) ctx.send('tick', dt)
          rafId = requestAnimationFrame(loop)
        }
        rafId = requestAnimationFrame(loop)
        const onKey = (e) => {
          if (e.key === ' ') { e.preventDefault(); ctx.send('togglePlay') }
          if (e.key === 'ArrowRight') { e.preventDefault(); ctx.send('nextLine') }
        }
        window.addEventListener('keydown', onKey)
        return () => { cancelAnimationFrame(rafId); window.removeEventListener('keydown', onKey) }
      },
    })

    Demo.mount(document.body)
  </script>
</body>
</html>
