<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Transitions — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .stage {
      width: min(640px, 90vw);
      height: min(400px, 50vh);
      background: #151520;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      will-change: transform, opacity;
    }
    .panel-a { background: linear-gradient(135deg, #1a5c3a, #2a8c5a); z-index: 1; }
    .panel-b { background: linear-gradient(135deg, #5c3a1a, #8c5a2a); z-index: 0; }
    .controls {
      display: flex;
      gap: 8px;
    }
    .controls button {
      background: #151520;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    .controls button:hover { background: #1e1e30; }
    .controls button.active { background: #2a3a2a; border-color: #4f8; color: #4f8; }
    .zoom-display {
      font-size: 14px;
      color: #888;
      background: #151520;
      padding: 8px 16px;
      border-radius: 8px;
      min-width: 180px;
      text-align: center;
    }
    .zoom-display span { color: #4f8; font-weight: 700; font-size: 18px; }
    .info {
      font-size: 13px;
      color: #666;
    }
    .info code { color: #4f8; }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="stage">
    <div class="panel panel-a">🌿 Panel A</div>
    <div class="panel panel-b">🌅 Panel B</div>
  </div>
  <div class="controls">
    <button data-zoom="zoomIn">🔍 Zoom In</button>
    <button data-zoom="zoomOut">🔎 Zoom Out</button>
  </div>
  <div class="zoom-display">
    A scale: <span id="scale-a">1.00</span> | B scale: <span id="scale-b">1.00</span>
  </div>
  <div class="info">
    Using <code>createTransition</code> from <code>@uploop/compositor</code>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
