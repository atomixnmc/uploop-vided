<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Composite — uploop-vided</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }
    .layout {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 960px;
    }
    .preview-card {
      background: #151520;
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
      min-width: 400px;
      max-width: 600px;
    }
    .preview-card canvas {
      width: 100%;
      display: block;
      background: #000;
    }
    .timeline-card {
      background: #151520;
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      min-width: 280px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .timeline-card h3 {
      font-size: 15px;
      color: #aaa;
    }
    .track-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .track-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #1a1a28;
      border-radius: 6px;
      font-size: 12px;
    }
    .track-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .track-icon.video { background: #2a3a5a; }
    .track-icon.audio { background: #3a2a5a; }
    .track-icon.text  { background: #3a5a2a; }
    .track-info { flex: 1; }
    .track-name { color: #ccc; }
    .track-clips { color: #666; font-size: 11px; margin-top: 2px; }
    .controls-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .controls-row button {
      background: #1a1a28;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .controls-row button:hover { background: #1e1e30; }
    .time-display {
      font-size: 20px;
      font-weight: 700;
      color: #4f8;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }
    .scrubber-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scrubber-row input[type="range"] {
      flex: 1;
      accent-color: #4f8;
      cursor: pointer;
    }
    .scrubber-row span { font-size: 12px; color: #666; min-width: 60px; text-align: right; }
    .info {
      font-size: 13px;
      color: #666;
    }
    .info code { color: #4f8; }
    .back {
      position: fixed;
      top: 16px; left: 16px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href=".." class="back">← Examples</a>
  <div class="layout">
    <div class="preview-card">
      <canvas id="preview-canvas" width="640" height="360"></canvas>
    </div>
    <div class="timeline-card">
      <h3>📊 Timeline</h3>
      <div class="time-display" id="time-display">00:00.00</div>
      <div class="scrubber-row">
        <input type="range" id="scrubber" min="0" max="1000" value="0" step="1">
        <span id="duration-label">00:00</span>
      </div>
      <div class="controls-row">
        <button id="btn-play">▶ Play</button>
        <button id="btn-stop">⏹ Stop</button>
        <button id="btn-restart">↺ Restart</button>
      </div>
      <div class="track-list" id="track-list"></div>
    </div>
  </div>
  <div class="info">
    Full pipeline: <code>Timeline</code> + <code>Compositor</code> — multi-track, text overlays, preview canvas
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
