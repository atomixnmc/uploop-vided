name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'packages/**/src/**'
      - 'vite.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Need uploopjs source for @uploop/html cross-project import
      - name: Clone uploopjs
        run: |
          git clone https://github.com/atomixnmc/uploopjs.git ../uploopjs --depth 1

      - run: pnpm install --no-frozen-lockfile

      - name: Build examples
        run: npx vite build --base /uploop-vided/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
